# ═════════════════════════════════════════════════════════════════════
# Borg Nanoprobe — Local-first GitHub issue repair workflow
# ═════════════════════════════════════════════════════════════════════
# Inspired by the default archon-fix-github-issue workflow, adapted for BorgOS:
# - deterministic shell nodes for GitHub, git, validation, and artifact plumbing
# - Qwen3.6-27B-MTP for issue-aware planning and final synthesis
# - Qwen3.6 local model for implementation and targeted fixes
# - Qwen3.5-9B for classification and small review probes
# - explicit artifacts between all fresh-context nodes
# - optional Action Memory artifact for the Borg Second Brain
# ═════════════════════════════════════════════════════════════════════

name: borg-nanoprobe
description: |
  Fix a GitHub issue end-to-end using BorgOS local-first model routing.

  Use when: The user wants to fix, resolve, or implement a GitHub issue in the BorgOS repository.
  Triggers: "borg nanoprobe", "nanoprobe issue", "fix issue with Borg", "fix #123 locally",
            "use Borg Nanoprobe", "repair issue with Qwen".

  What it does:
  1. Extracts and fetches a GitHub issue deterministically with the GitHub CLI.
  2. Classifies the issue with local Qwen3.5-9B.
  3. Scans the repository deterministically for likely affected files.
  4. Runs Qwen3.6 bug triage before any fix work and labels the GitHub issue.
  5. Continues only when Qwen confirms this is a real bug.
  6. Creates an issue-aware fix plan with Qwen3.6-27B-MTP.
  7. Implements the fix with local Qwen3.6.
  8. Runs deterministic validation and lets Qwen fix validation failures.
  9. Runs parallel Qwen3.5-9B nanoprobe reviews for scope, error handling, tests, and UI/UX.
  10. Synthesizes review findings with Qwen3.6-27B-MTP and lets Qwen fix critical/high findings.
  11. Performs final validation and a final Qwen3.6-27B-MTP review.
  12. Creates a draft PR and writes a Borg Action Memory artifact.

  Model routing:
  - Qwen3.5-9B local: classification and small parallel review probes.
  - Qwen3.6 local: bug triage, implementation, and targeted fixes.
  - Qwen3.6-27B-MTP: planning, review synthesis, and final gate.
  - No GPT model is referenced by default; add one only after validating the installed model catalog.

  Input: A GitHub issue reference such as "Fix issue #123".
  Output: A draft PR, issue comment, validation artifacts, and a Borg Action Memory JSON artifact.

  NOT for: broad greenfield features without a GitHub issue, architecture-only reviews, or long multi-epic projects.

provider: pi
model: lm-studio/qwen/qwen3.6-35b-a3b-mtp
worktree:
  enabled: true

nodes:
  # ═══════════════════════════════════════════════════════════════════
  # PHASE 0: INIT
  # ═══════════════════════════════════════════════════════════════════

  - id: init
    bash: |
      set -euo pipefail
      mkdir -p "$ARTIFACTS_DIR/issue" \
               "$ARTIFACTS_DIR/plan" \
               "$ARTIFACTS_DIR/implementation" \
               "$ARTIFACTS_DIR/validation" \
               "$ARTIFACTS_DIR/reviews" \
               "$ARTIFACTS_DIR/fixes" \
               "$ARTIFACTS_DIR/final" \
               "$ARTIFACTS_DIR/action-memory"
      cat > "$ARTIFACTS_DIR/state.json" << 'EOF'
      {
        "workflow": "borg-nanoprobe",
        "status": "initialized",
        "validationStatus": "unknown",
        "finalReview": "pending"
      }
      EOF
      echo "Borg Nanoprobe initialized at $ARTIFACTS_DIR"
    timeout: 10000

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 1: FETCH AND CLASSIFY ISSUE
  # ═══════════════════════════════════════════════════════════════════

  - id: extract-issue-number
    depends_on: [init]
    bash: |
      set -euo pipefail
      ARG='$ARGUMENTS'
      ISSUE_NUM=$(printf '%s\n' "$ARG" | grep -oE '#[0-9]+|issue[[:space:]]+[0-9]+|[0-9]+' | head -1 | grep -oE '[0-9]+' || true)
      if [ -z "$ISSUE_NUM" ]; then
        echo "Could not extract an issue number from: $ARG" >&2
        echo "Please invoke with an explicit issue number, e.g. Fix issue #123." >&2
        exit 1
      fi
      echo "$ISSUE_NUM" | tee "$ARTIFACTS_DIR/issue/issue-number.txt"
    timeout: 10000

  - id: fetch-issue
    depends_on: [extract-issue-number]
    bash: |
      set -euo pipefail
      ISSUE_NUM=$(cat "$ARTIFACTS_DIR/issue/issue-number.txt")
      gh issue view "$ISSUE_NUM" --json title,body,labels,comments,state,url,author > "$ARTIFACTS_DIR/issue/issue.json"
      python3 - << 'PY'
      import json, os
      p = os.path.join(os.environ['ARTIFACTS_DIR'], 'issue', 'issue.json')
      issue = json.load(open(p))
      labels = ', '.join([l.get('name', '') for l in issue.get('labels', [])])
      print(f"Issue #{open(os.path.join(os.environ['ARTIFACTS_DIR'], 'issue', 'issue-number.txt')).read().strip()}: {issue.get('title', '')}")
      print(f"State: {issue.get('state', '')}")
      print(f"Labels: {labels}")
      print(f"URL: {issue.get('url', '')}")
      PY
    timeout: 30000

  - id: classify-issue
    depends_on: [fetch-issue]
    context: fresh
    provider: pi
    model: lm-studio/qwen/qwen3.5-9b
    idle_timeout: 1800000
    allowed_tools: []
    prompt: |
      You are a concise GitHub issue classifier for BorgOS.

      Read the issue JSON below and classify it.

      ## Issue
      $fetch-issue.output

      ## Rules
      - bug: broken behavior, crash, error, regression, failing workflow, or incorrect output
      - feature: net-new user-facing capability
      - enhancement: improvement or extension of existing behavior
      - refactor: internal structure change without behavior change
      - chore: maintenance, dependency, CI, cleanup
      - documentation: docs, README, comments, examples

      Return only the structured JSON requested by the schema.
    output_format:
      type: object
      properties:
        issue_type:
          type: string
          enum: ["bug", "feature", "enhancement", "refactor", "chore", "documentation"]
        title:
          type: string
        risk_level:
          type: string
          enum: ["low", "medium", "high"]
        reasoning:
          type: string
      required: [issue_type, title, risk_level, reasoning]

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 2: DETERMINISTIC REPO SCAN
  # ═══════════════════════════════════════════════════════════════════

  - id: repo-scan
    depends_on: [classify-issue]
    bash: |
      set -euo pipefail
      OUT="$ARTIFACTS_DIR/issue/repo-scan.md"
      ISSUE_JSON="$ARTIFACTS_DIR/issue/issue.json"
      echo "# Repository Scan" > "$OUT"
      echo >> "$OUT"
      echo "## Git Status" >> "$OUT"
      echo '```' >> "$OUT"
      git status --short >> "$OUT" || true
      echo '```' >> "$OUT"
      echo >> "$OUT"
      echo "## Top-level Structure" >> "$OUT"
      echo '```' >> "$OUT"
      find . -maxdepth 2 -type f \
        -not -path './.git/*' \
        -not -path './frontend/node_modules/*' \
        -not -path './.archon/workspaces/*' \
        | sort | sed 's#^./##' | head -200 >> "$OUT"
      echo '```' >> "$OUT"
      echo >> "$OUT"
      echo "## Candidate Terms" >> "$OUT"
      python3 - << 'PY' > "$ARTIFACTS_DIR/issue/terms.txt"
      import json, os, re
      issue = json.load(open(os.path.join(os.environ['ARTIFACTS_DIR'], 'issue', 'issue.json')))
      text = ' '.join([
          issue.get('title') or '',
          issue.get('body') or '',
          ' '.join(l.get('name', '') for l in issue.get('labels', [])),
      ])
      words = re.findall(r'[A-Za-z][A-Za-z0-9_-]{3,}', text)
      stop = {'issue','with','this','that','from','have','when','then','there','should','would','could','about','github','borgos'}
      seen = []
      for w in words:
          lw = w.lower()
          if lw not in stop and lw not in seen:
              seen.append(lw)
      print('\n'.join(seen[:12]))
      PY
      cat "$ARTIFACTS_DIR/issue/terms.txt" >> "$OUT"
      echo >> "$OUT"
      echo "## Grep Hits" >> "$OUT"
      while IFS= read -r term; do
        [ -z "$term" ] && continue
        echo "### $term" >> "$OUT"
        echo '```' >> "$OUT"
        rg -n --hidden --glob '!frontend/node_modules/**' --glob '!.git/**' --glob '!.archon/workspaces/**' --glob '!borgos.db' "$term" . | head -40 >> "$OUT" || true
        echo '```' >> "$OUT"
      done < "$ARTIFACTS_DIR/issue/terms.txt"
      cat "$OUT"
    timeout: 60000

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 3: QWEN BUG TRIAGE AND GITHUB LABELING
  # ═══════════════════════════════════════════════════════════════════

  - id: qwen-bug-triage
    depends_on: [repo-scan]
    context: fresh
    provider: pi
    model: lm-studio/qwen/qwen3.6-35b-a3b-mtp
    idle_timeout: 1800000
    prompt: |
      # Borg Nanoprobe — Qwen Bug Triage

      You are Qwen3.6 performing a pre-fix bug triage for BorgOS.
      Decide whether the GitHub issue describes a real, reproducible bug before any fix work begins.
      Do not edit source files in this node.

      ## User Request
      $ARGUMENTS

      ## Issue Classification
      $classify-issue.output

      ## Required Reads
      1. `$ARTIFACTS_DIR/issue/issue.json`
      2. `$ARTIFACTS_DIR/issue/repo-scan.md`
      3. The most relevant source files surfaced by the scan, only as needed to verify plausibility

      ## Decision Rules
      - `confirmed_bug`: The issue describes behavior that is likely wrong, reproducible, and fixable in this repository.
      - `not_a_bug`: The reported behavior is expected, unsupported, user error, environment-specific without repo evidence, or cannot be tied to code.
      - `needs_info`: The issue lacks enough reproduction detail or evidence to safely fix.
      - `valid_non_bug_request`: The issue is valid work, but it is a feature/enhancement/docs/chore request rather than a bug.

      ## Required Artifact
      Write `$ARTIFACTS_DIR/issue/qwen-bug-triage.md` with:
      - Decision
      - Confidence: low, medium, or high
      - Evidence from the issue and repository
      - Minimal reproduction or missing reproduction details
      - Suggested GitHub label
      - Next action

      Return only the structured JSON requested by the schema.
    output_format:
      type: object
      properties:
        decision:
          type: string
          enum: ["confirmed_bug", "not_a_bug", "needs_info", "valid_non_bug_request"]
        confidence:
          type: string
          enum: ["low", "medium", "high"]
        github_label:
          type: string
          enum: ["borg:confirmed-bug", "borg:not-a-bug", "borg:needs-info", "borg:non-bug-request"]
        should_fix:
          type: string
          enum: ["true", "false"]
        reasoning:
          type: string
        next_action:
          type: string
      required: [decision, confidence, github_label, should_fix, reasoning, next_action]

  - id: set-github-triage-label
    depends_on: [qwen-bug-triage]
    bash: |
      set -euo pipefail
      ISSUE_NUM=$(cat "$ARTIFACTS_DIR/issue/issue-number.txt")
      TRIAGE_JSON="$ARTIFACTS_DIR/issue/qwen-bug-triage-output.json"
      cat > "$TRIAGE_JSON" << 'EOF'
      $qwen-bug-triage.output
      EOF

      LABEL=$(python3 - << 'PY'
      import json, os
      p = os.path.join(os.environ['ARTIFACTS_DIR'], 'issue', 'qwen-bug-triage-output.json')
      data = json.load(open(p))
      print(data.get('github_label') or 'borg:needs-info')
      PY
      )

      case "$LABEL" in
        borg:confirmed-bug) COLOR="d73a4a"; DESC="Qwen triage confirmed this is a real bug" ;;
        borg:not-a-bug) COLOR="cfd3d7"; DESC="Qwen triage determined this is not a bug" ;;
        borg:needs-info) COLOR="d876e3"; DESC="Qwen triage needs more reproduction details" ;;
        borg:non-bug-request) COLOR="a2eeef"; DESC="Qwen triage found valid work that is not a bug" ;;
        *) LABEL="borg:needs-info"; COLOR="d876e3"; DESC="Qwen triage needs more reproduction details" ;;
      esac

      gh label create "$LABEL" --color "$COLOR" --description "$DESC" >/dev/null 2>&1 || true
      gh label create "borg:triaged" --color "7057ff" --description "Reviewed by Borg Nanoprobe triage" >/dev/null 2>&1 || true
      gh issue edit "$ISSUE_NUM" --add-label "$LABEL" >/dev/null
      gh issue edit "$ISSUE_NUM" --add-label "borg:triaged" >/dev/null

      echo "Applied labels to issue #$ISSUE_NUM: $LABEL, borg:triaged"
    timeout: 30000

  - id: triage-stop-report
    depends_on: [set-github-triage-label]
    when: "$qwen-bug-triage.output.decision != 'confirmed_bug'"
    bash: |
      set +e
      ISSUE_NUM=$(cat "$ARTIFACTS_DIR/issue/issue-number.txt" 2>/dev/null)
      OUT="$ARTIFACTS_DIR/final/triage-stop-report.md"
      TRIAGE_JSON="$ARTIFACTS_DIR/issue/qwen-bug-triage-output.json"
      DECISION=$(python3 - << 'PY' 2>/dev/null
      import json, os
      p = os.path.join(os.environ['ARTIFACTS_DIR'], 'issue', 'qwen-bug-triage-output.json')
      data = json.load(open(p))
      print(data.get('decision', 'unknown'))
      PY
      )
      NEXT=$(python3 - << 'PY' 2>/dev/null
      import json, os
      p = os.path.join(os.environ['ARTIFACTS_DIR'], 'issue', 'qwen-bug-triage-output.json')
      data = json.load(open(p))
      print(data.get('next_action', 'No next action recorded.'))
      PY
      )
      cat > "$OUT" << EOF
      # Borg Nanoprobe Triage Stop

      Qwen triage decision: **${DECISION:-unknown}**

      No fix was attempted because the issue was not confirmed as a real bug.

      Next action:
      ${NEXT:-No next action recorded.}

      See: \`$ARTIFACTS_DIR/issue/qwen-bug-triage.md\`
      EOF
      if [ -n "$ISSUE_NUM" ]; then
        gh issue comment "$ISSUE_NUM" --body-file "$OUT" >/dev/null 2>&1 || true
      fi
      cat "$OUT"
      exit 0
    timeout: 30000

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 4: PLAN
  # ═══════════════════════════════════════════════════════════════════

  - id: borg-triage-plan
    depends_on: [set-github-triage-label]
    when: "$qwen-bug-triage.output.decision == 'confirmed_bug'"
    context: fresh
    provider: pi
    model: lm-studio/qwen3.6-27b-mtp
    effort: high
    thinking: enabled
    idle_timeout: 1800000
    prompt: |
      # Borg Nanoprobe — Issue Triage and Fix Plan

      You are the BorgOS issue triage architect. Create a precise implementation plan.
      Do not modify source files in this node.

      ## User Request
      $ARGUMENTS

      ## Issue Classification
      $classify-issue.output

      ## Qwen Bug Triage
      $qwen-bug-triage.output

      ## Required Reads
      1. `$ARTIFACTS_DIR/issue/issue.json`
      2. `$ARTIFACTS_DIR/issue/repo-scan.md`
      3. `$ARTIFACTS_DIR/issue/qwen-bug-triage.md`
      4. Relevant source files surfaced by the scan
      5. Project conventions such as CLAUDE.md or guidance files if present

      ## Planning Rules
      - Ground every recommendation in actual files.
      - Prefer a small, direct fix over broad refactoring.
      - Define a narrow scope boundary.
      - Identify validation commands that are deterministic.
      - If the fix is too broad for one pass, split it into at most four nanoprobe tasks.
      - Implementation will be done by local Qwen; make the handoff self-contained.

      ## Required Artifacts
      Write `$ARTIFACTS_DIR/plan/fix-plan.md` with:
      - Issue summary and classification
      - Root cause or expected feature behavior
      - Files to read first
      - Files likely to change
      - Step-by-step implementation plan
      - Validation commands
      - Risks and rollback notes
      - Explicit out-of-scope items

      Write `$ARTIFACTS_DIR/plan/implementation-handoff.md` with concise instructions
      that a fresh-context Qwen agent can execute without prior memory.

      Write `$ARTIFACTS_DIR/plan/review-focus.md` with the exact review questions
      Qwen review stages should answer after implementation.

      End with `<promise>BORG_NANOPROBE_PLAN_COMPLETE</promise>`.

  - id: verify-plan
    depends_on: [borg-triage-plan]
    bash: |
      set -euo pipefail
      test -s "$ARTIFACTS_DIR/plan/fix-plan.md"
      test -s "$ARTIFACTS_DIR/plan/implementation-handoff.md"
      test -s "$ARTIFACTS_DIR/plan/review-focus.md"
      echo "PLAN_OK"
    timeout: 10000

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 5: IMPLEMENT WITH QWEN
  # ═══════════════════════════════════════════════════════════════════

  - id: implement-fix
    depends_on: [verify-plan]
    context: fresh
    provider: pi
    model: lm-studio/qwen/qwen3.6-35b-a3b-mtp
    idle_timeout: 1800000
    prompt: |
      # Borg Nanoprobe — Qwen Implementation

      You are Qwen3.6 implementing a narrow GitHub issue fix for BorgOS.

      ## Required First Reads
      - `$ARTIFACTS_DIR/issue/issue.json`
      - `$ARTIFACTS_DIR/issue/repo-scan.md`
      - `$ARTIFACTS_DIR/plan/fix-plan.md`
      - `$ARTIFACTS_DIR/plan/implementation-handoff.md`
      - Source files named in the handoff

      ## Scope Rules
      - Implement only the issue fix described in the plan.
      - Do not perform unrelated refactors.
      - Do not stage, commit, or push in this node.
      - Do not edit generated artifacts, binaries, `.env`, databases, or secrets.
      - Preserve existing architecture and style.
      - Add or update tests when the plan calls for it or when the fix changes behavior.

      ## Required Artifact
      Write `$ARTIFACTS_DIR/implementation/implementation.md` with:
      - Summary of changes
      - Files changed
      - Tests or validation run manually in this node, if any
      - Deviations from the plan
      - Remaining risks or questions

      End with `<promise>BORG_NANOPROBE_IMPLEMENTED</promise>`.

  - id: implementation-status
    depends_on: [implement-fix]
    bash: |
      set -euo pipefail
      OUT="$ARTIFACTS_DIR/implementation/git-status.md"
      echo "# Implementation Git Status" > "$OUT"
      echo >> "$OUT"
      echo "## Status" >> "$OUT"
      echo '```' >> "$OUT"
      git status --short >> "$OUT" || true
      echo '```' >> "$OUT"
      echo >> "$OUT"
      echo "## Diff Stat" >> "$OUT"
      echo '```' >> "$OUT"
      git diff --stat >> "$OUT" || true
      echo '```' >> "$OUT"
      cat "$OUT"
    timeout: 10000

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 6: VALIDATE AND FIX VALIDATION FAILURES
  # ═══════════════════════════════════════════════════════════════════

  - id: validate
    depends_on: [implementation-status]
    bash: |
      set +e
      OUT="$ARTIFACTS_DIR/validation/validation.md"
      : > "$OUT"
      echo "# Validation" >> "$OUT"
      echo >> "$OUT"

      run_check() {
        NAME="$1"
        CMD="$2"
        echo "## $NAME" >> "$OUT"
        echo '```' >> "$OUT"
        bash -lc "$CMD" >> "$OUT" 2>&1
        CODE=$?
        echo '```' >> "$OUT"
        echo "Exit code: $CODE" >> "$OUT"
        echo >> "$OUT"
        return $CODE
      }

      FAIL=0
      if [ -d backend ]; then
        run_check "Backend tests" "cd backend && uv run python -m pytest -v" || FAIL=1
      fi
      if [ -d frontend ]; then
        if [ -f frontend/package.json ]; then
          if grep -q '"type-check"' frontend/package.json; then
            run_check "Frontend type-check" "cd frontend && npm run type-check" || FAIL=1
          fi
          if grep -q '"lint"' frontend/package.json; then
            run_check "Frontend lint" "cd frontend && npm run lint" || FAIL=1
          fi
          if grep -q '"test"' frontend/package.json; then
            run_check "Frontend tests" "cd frontend && npm run test -- --run" || run_check "Frontend tests fallback" "cd frontend && npm run test" || FAIL=1
          fi
        fi
      fi

      if [ "$FAIL" -eq 0 ]; then
        echo "VALIDATION_STATUS: PASS" >> "$OUT"
      else
        echo "VALIDATION_STATUS: FAIL" >> "$OUT"
      fi
      cat "$OUT"
      exit 0
    timeout: 600000

  - id: fix-validation-failures
    depends_on: [validate]
    context: fresh
    provider: pi
    model: lm-studio/qwen/qwen3.6-35b-a3b-mtp
    idle_timeout: 1800000
    prompt: |
      # Borg Nanoprobe — Fix Validation Failures

      Read `$ARTIFACTS_DIR/validation/validation.md`.

      If it ends with `VALIDATION_STATUS: PASS`, write
      `$ARTIFACTS_DIR/fixes/validation-no-fixes-needed.md` and stop.

      If validation failed:
      - Fix only the validation failures introduced by this issue fix.
      - Do not broaden scope.
      - Run the specific failing command after each fix.
      - Do not stage, commit, or push.

      Write `$ARTIFACTS_DIR/fixes/validation-fixes.md` with:
      - Failures addressed
      - Files changed
      - Commands rerun and results
      - Remaining failures, if any

      End with `<promise>BORG_NANOPROBE_VALIDATION_FIXED</promise>`.

  - id: revalidate
    depends_on: [fix-validation-failures]
    bash: |
      set +e
      OUT="$ARTIFACTS_DIR/validation/revalidation.md"
      : > "$OUT"
      echo "# Revalidation" >> "$OUT"
      echo >> "$OUT"

      run_check() {
        NAME="$1"
        CMD="$2"
        echo "## $NAME" >> "$OUT"
        echo '```' >> "$OUT"
        bash -lc "$CMD" >> "$OUT" 2>&1
        CODE=$?
        echo '```' >> "$OUT"
        echo "Exit code: $CODE" >> "$OUT"
        echo >> "$OUT"
        return $CODE
      }

      FAIL=0
      if [ -d backend ]; then
        run_check "Backend tests" "cd backend && uv run python -m pytest -v" || FAIL=1
      fi
      if [ -d frontend ] && [ -f frontend/package.json ]; then
        if grep -q '"type-check"' frontend/package.json; then
          run_check "Frontend type-check" "cd frontend && npm run type-check" || FAIL=1
        fi
        if grep -q '"lint"' frontend/package.json; then
          run_check "Frontend lint" "cd frontend && npm run lint" || FAIL=1
        fi
        if grep -q '"test"' frontend/package.json; then
          run_check "Frontend tests" "cd frontend && npm run test -- --run" || run_check "Frontend tests fallback" "cd frontend && npm run test" || FAIL=1
        fi
      fi

      if [ "$FAIL" -eq 0 ]; then
        echo "VALIDATION_STATUS: PASS" >> "$OUT"
      else
        echo "VALIDATION_STATUS: FAIL" >> "$OUT"
      fi
      cat "$OUT"
      exit 0
    timeout: 600000

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 7: PARALLEL QWEN3.5-9B NANOPROBE REVIEWS
  # ═══════════════════════════════════════════════════════════════════

  - id: scope-review
    depends_on: [revalidate]
    context: fresh
    provider: pi
    model: lm-studio/qwen/qwen3.5-9b
    idle_timeout: 1800000
    prompt: |
      # Borg Nanoprobe — Scope Review

      You are Qwen3.5-9B performing a narrow scope review.

      Required reads:
      - `$ARTIFACTS_DIR/issue/issue.json`
      - `$ARTIFACTS_DIR/plan/fix-plan.md`
      - `$ARTIFACTS_DIR/implementation/git-status.md`
      - actual changed files from `git diff`

      Determine whether the diff only addresses the GitHub issue and plan.
      Write `$ARTIFACTS_DIR/reviews/scope-review.md` with:
      - Verdict: PASS or FAIL
      - Out-of-scope files or changes
      - Required fixes, if any
      - Evidence with file paths and line references

      End with `<promise>SCOPE_REVIEW_COMPLETE</promise>`.

  - id: error-handling-review
    depends_on: [revalidate]
    context: fresh
    provider: pi
    model: lm-studio/qwen/qwen3.5-9b
    idle_timeout: 1800000
    prompt: |
      # Borg Nanoprobe — Error Handling Review

      You are Qwen3.5-9B reviewing error handling and data safety.

      Required reads:
      - `$ARTIFACTS_DIR/plan/review-focus.md`
      - `$ARTIFACTS_DIR/implementation/implementation.md`
      - actual changed backend/frontend files from `git diff`

      Focus on:
      - failed API calls
      - async errors
      - null/empty inputs
      - database/session safety
      - authorization boundaries
      - user-visible error states

      Write `$ARTIFACTS_DIR/reviews/error-handling-review.md` with:
      - Verdict: PASS or FAIL
      - CRITICAL/HIGH/MEDIUM/LOW findings
      - Required fixes, if any
      - Evidence with file paths and line references

      End with `<promise>ERROR_HANDLING_REVIEW_COMPLETE</promise>`.

  - id: test-gap-review
    depends_on: [revalidate]
    context: fresh
    provider: pi
    model: lm-studio/qwen/qwen3.5-9b
    idle_timeout: 1800000
    prompt: |
      # Borg Nanoprobe — Test Gap Review

      You are Qwen3.5-9B reviewing test coverage risk.

      Required reads:
      - `$ARTIFACTS_DIR/issue/issue.json`
      - `$ARTIFACTS_DIR/plan/fix-plan.md`
      - `$ARTIFACTS_DIR/validation/revalidation.md`
      - changed source and test files from `git diff`

      Focus on:
      - missing regression tests for the issue
      - weak assertions
      - untested API branches
      - frontend state coverage gaps
      - whether deterministic validation is sufficient

      Write `$ARTIFACTS_DIR/reviews/test-gap-review.md` with:
      - Verdict: PASS or FAIL
      - Test gaps by severity
      - Required test additions, if any
      - Evidence with file paths and line references

      End with `<promise>TEST_GAP_REVIEW_COMPLETE</promise>`.

  - id: frontend-ux-review
    depends_on: [revalidate]
    context: fresh
    provider: pi
    model: lm-studio/qwen/qwen3.5-9b
    idle_timeout: 1800000
    prompt: |
      # Borg Nanoprobe — Frontend UX Review

      You are Qwen3.5-9B reviewing UI/UX only if the diff touches frontend files.
      If no frontend files changed, write a short PASS report explaining that the review is not applicable.

      Required reads:
      - `$ARTIFACTS_DIR/implementation/git-status.md`
      - changed frontend files from `git diff`, if any

      Focus on:
      - loading, error, and empty states
      - accessibility basics
      - consistency with existing BorgOS components and style
      - navigation and discoverability
      - user-facing copy

      Write `$ARTIFACTS_DIR/reviews/frontend-ux-review.md` with:
      - Verdict: PASS, FAIL, or NOT_APPLICABLE
      - Findings by severity
      - Required fixes, if any
      - Evidence with file paths and line references

      End with `<promise>FRONTEND_UX_REVIEW_COMPLETE</promise>`.

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 8: SYNTHESIZE AND FIX REVIEW FINDINGS
  # ═══════════════════════════════════════════════════════════════════

  - id: synthesize-reviews
    depends_on: [scope-review, error-handling-review, test-gap-review, frontend-ux-review]
    trigger_rule: none_failed_min_one_success
    context: fresh
    provider: pi
    model: lm-studio/qwen3.6-27b-mtp
    effort: high
    thinking: enabled
    idle_timeout: 1800000
    prompt: |
      # Borg Nanoprobe — Review Synthesis

      You are Qwen3.6-27B-MTP synthesizing Qwen3.5-9B nanoprobe reviews into an actionable fix list.

      Required reads:
      - `$ARTIFACTS_DIR/reviews/scope-review.md`
      - `$ARTIFACTS_DIR/reviews/error-handling-review.md`
      - `$ARTIFACTS_DIR/reviews/test-gap-review.md`
      - `$ARTIFACTS_DIR/reviews/frontend-ux-review.md`
      - `$ARTIFACTS_DIR/validation/revalidation.md`
      - `git diff`

      Write `$ARTIFACTS_DIR/reviews/synthesis.md` with:
      - Overall verdict: PASS or FIX_REQUIRED
      - Deduplicated CRITICAL/HIGH/MEDIUM/LOW findings
      - Exact fixes Qwen must perform
      - Findings intentionally rejected as non-issues, with rationale
      - Validation commands to rerun

      End with `<promise>REVIEW_SYNTHESIS_COMPLETE</promise>`.

  - id: self-fix-review-findings
    depends_on: [synthesize-reviews]
    context: fresh
    provider: pi
    model: lm-studio/qwen/qwen3.6-35b-a3b-mtp
    idle_timeout: 1800000
    prompt: |
      # Borg Nanoprobe — Qwen Review Fixes

      Read `$ARTIFACTS_DIR/reviews/synthesis.md`.

      If the synthesis verdict is PASS and there are no CRITICAL/HIGH findings,
      write `$ARTIFACTS_DIR/fixes/review-no-fixes-needed.md` and stop.

      If fixes are required:
      - Fix all CRITICAL and HIGH findings.
      - Fix MEDIUM findings only when straightforward and low-risk.
      - Do not broaden the issue scope.
      - Do not stage, commit, or push.
      - Rerun relevant validation commands.

      Write `$ARTIFACTS_DIR/fixes/review-fixes.md` with:
      - Findings addressed
      - Files changed
      - Validation commands and results
      - Remaining risks

      End with `<promise>REVIEW_FIXES_COMPLETE</promise>`.

  - id: final-validation
    depends_on: [self-fix-review-findings]
    bash: |
      set +e
      OUT="$ARTIFACTS_DIR/final/final-validation.md"
      : > "$OUT"
      echo "# Final Validation" >> "$OUT"
      echo >> "$OUT"

      run_check() {
        NAME="$1"
        CMD="$2"
        echo "## $NAME" >> "$OUT"
        echo '```' >> "$OUT"
        bash -lc "$CMD" >> "$OUT" 2>&1
        CODE=$?
        echo '```' >> "$OUT"
        echo "Exit code: $CODE" >> "$OUT"
        echo >> "$OUT"
        return $CODE
      }

      FAIL=0
      if [ -d backend ]; then
        run_check "Backend tests" "cd backend && uv run python -m pytest -v" || FAIL=1
      fi
      if [ -d frontend ] && [ -f frontend/package.json ]; then
        if grep -q '"type-check"' frontend/package.json; then
          run_check "Frontend type-check" "cd frontend && npm run type-check" || FAIL=1
        fi
        if grep -q '"lint"' frontend/package.json; then
          run_check "Frontend lint" "cd frontend && npm run lint" || FAIL=1
        fi
        if grep -q '"test"' frontend/package.json; then
          run_check "Frontend tests" "cd frontend && npm run test -- --run" || run_check "Frontend tests fallback" "cd frontend && npm run test" || FAIL=1
        fi
      fi

      if [ "$FAIL" -eq 0 ]; then
        echo "FINAL_VALIDATION_STATUS: PASS" >> "$OUT"
      else
        echo "FINAL_VALIDATION_STATUS: FAIL" >> "$OUT"
      fi
      cat "$OUT"
      exit 0
    timeout: 600000

  - id: final-review
    depends_on: [final-validation]
    context: fresh
    provider: pi
    model: lm-studio/qwen3.6-27b-mtp
    effort: high
    thinking: enabled
    idle_timeout: 1800000
    prompt: |
      # Borg Nanoprobe — Final Review Gate

      You are the final reviewer. Be strict and evidence-based.

      Required reads:
      - `$ARTIFACTS_DIR/issue/issue.json`
      - `$ARTIFACTS_DIR/plan/fix-plan.md`
      - `$ARTIFACTS_DIR/implementation/implementation.md`
      - `$ARTIFACTS_DIR/reviews/synthesis.md`
      - `$ARTIFACTS_DIR/final/final-validation.md`
      - `git diff`

      Decide if the branch is ready for a draft PR.

      Write `$ARTIFACTS_DIR/final/final-review.md` with:
      - Verdict: APPROVED or BLOCKED
      - Issue coverage assessment
      - Validation assessment
      - Security/data-safety assessment
      - Remaining risks
      - Exact blockers if not approved

      End with `<promise>FINAL_REVIEW_COMPLETE</promise>`.

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 9: CREATE DRAFT PR AND REPORT
  # ═══════════════════════════════════════════════════════════════════

  - id: create-draft-pr
    depends_on: [final-review]
    context: fresh
    provider: pi
    model: lm-studio/qwen/qwen3.5-9b
    idle_timeout: 1800000
    prompt: |
      # Borg Nanoprobe — Create Draft PR

      Create a draft pull request if the final review is not BLOCKED.

      Required reads:
      - `$ARTIFACTS_DIR/final/final-review.md`
      - `$ARTIFACTS_DIR/final/final-validation.md`
      - `$ARTIFACTS_DIR/issue/issue-number.txt`
      - `$ARTIFACTS_DIR/issue/issue.json`
      - `git status --short`
      - `git diff --stat`

      Rules:
      - If final review says BLOCKED, do not create a PR. Write `$ARTIFACTS_DIR/final/pr-skipped.md`.
      - If there are no source changes, do not create a PR. Write `$ARTIFACTS_DIR/final/pr-skipped.md`.
      - Stage only explicit files that belong to the fix. Never use `git add -A`, `git add .`, or `git add -u`.
      - Never stage artifacts, logs, `.env`, databases, generated binaries, `.rpiv`, `.archon/logs`, or scratch files.
      - Commit with a concise conventional commit message.
      - Push with `git push -u origin HEAD`.
      - If a PR already exists for this branch, reuse it.
      - Otherwise create a draft PR targeting `$BASE_BRANCH`.
      - Include `Fixes #<issue-number>` in the PR body.
      - Save the PR number to `$ARTIFACTS_DIR/final/pr-number.txt` and URL to `$ARTIFACTS_DIR/final/pr-url.txt`.

      Suggested PR body sections:
      - Summary
      - Changes
      - Validation
      - Review evidence
      - Risks
      - Fixes #<issue-number>

      End with `<promise>DRAFT_PR_READY</promise>`.

  - id: issue-comment
    depends_on: [create-draft-pr]
    bash: |
      set +e
      ISSUE_NUM=$(cat "$ARTIFACTS_DIR/issue/issue-number.txt" 2>/dev/null)
      PR_URL=$(cat "$ARTIFACTS_DIR/final/pr-url.txt" 2>/dev/null)
      FINAL=$(grep -E 'Verdict:|FINAL_VALIDATION_STATUS:' "$ARTIFACTS_DIR/final/final-review.md" "$ARTIFACTS_DIR/final/final-validation.md" 2>/dev/null || true)
      BODY="$ARTIFACTS_DIR/final/issue-comment.md"
      cat > "$BODY" << EOF
      Borg Nanoprobe completed for this issue.

      PR: ${PR_URL:-not created}

      Final status:
      \`\`\`
      $FINAL
      \`\`\`

      Artifacts were generated for planning, implementation, validation, parallel Qwen3.5-9B reviews, and final review.
      EOF
      if [ -n "$ISSUE_NUM" ]; then
        gh issue comment "$ISSUE_NUM" --body-file "$BODY" >/dev/null 2>&1 || true
      fi
      cat "$BODY"
      exit 0
    timeout: 30000

  - id: action-memory-artifact
    depends_on: [issue-comment]
    bash: |
      set -euo pipefail
      ISSUE_NUM=$(cat "$ARTIFACTS_DIR/issue/issue-number.txt" 2>/dev/null || echo "unknown")
      PR_URL=$(cat "$ARTIFACTS_DIR/final/pr-url.txt" 2>/dev/null || echo "")
      FINAL_STATUS=$(grep -oE 'FINAL_VALIDATION_STATUS: (PASS|FAIL)' "$ARTIFACTS_DIR/final/final-validation.md" 2>/dev/null | tail -1 | awk '{print $2}' || true)
      [ -z "$FINAL_STATUS" ] && FINAL_STATUS="unknown"
      python3 - << 'PY'
      import json, os, datetime
      art = os.environ['ARTIFACTS_DIR']
      issue = open(os.path.join(art, 'issue', 'issue-number.txt')).read().strip() if os.path.exists(os.path.join(art, 'issue', 'issue-number.txt')) else 'unknown'
      pr_path = os.path.join(art, 'final', 'pr-url.txt')
      pr_url = open(pr_path).read().strip() if os.path.exists(pr_path) else ''
      val_path = os.path.join(art, 'final', 'final-validation.md')
      val = open(val_path).read() if os.path.exists(val_path) else ''
      status = 'success' if 'FINAL_VALIDATION_STATUS: PASS' in val else 'failed' if 'FINAL_VALIDATION_STATUS: FAIL' in val else 'unknown'
      payload = {
          'title': f'Borg Nanoprobe issue #{issue}',
          'description': 'Ran the Borg Nanoprobe local-first GitHub issue repair workflow.',
          'action_type': 'github_issue_fix',
          'tools_used': ['archon', 'gh', 'git', 'qwen3.5-9b', 'qwen3.6-27b-mtp', 'qwen3.6-35b-a3b-mtp'],
          'status': status,
          'output_path': pr_url or None,
          'metadata': {
              'issue_number': issue,
              'pr_url': pr_url,
              'workflow': 'borg-nanoprobe',
              'artifacts_dir': art,
              'timestamp': datetime.datetime.utcnow().isoformat() + 'Z'
          },
          'tags': ['borg', 'nanoprobe', 'github-issue', 'local-first']
      }
      out = os.path.join(art, 'action-memory', 'action-memory.json')
      with open(out, 'w') as f:
          json.dump(payload, f, indent=2)
      print(json.dumps(payload, indent=2))
      PY
    timeout: 10000

  - id: summary
    depends_on: [action-memory-artifact]
    context: fresh
    provider: pi
    model: lm-studio/qwen/qwen3.6-35b-a3b-mtp
    idle_timeout: 1800000
    prompt: |
      # Borg Nanoprobe — Workflow Summary

      Produce the final workflow summary.

      Required reads:
      - `$ARTIFACTS_DIR/issue/issue.json`
      - `$ARTIFACTS_DIR/plan/fix-plan.md`
      - `$ARTIFACTS_DIR/implementation/implementation.md`
      - `$ARTIFACTS_DIR/validation/revalidation.md`
      - `$ARTIFACTS_DIR/reviews/synthesis.md`
      - `$ARTIFACTS_DIR/final/final-review.md`
      - `$ARTIFACTS_DIR/final/pr-url.txt`, if present
      - `$ARTIFACTS_DIR/action-memory/action-memory.json`

      Write `$ARTIFACTS_DIR/final/summary.md` with:
      - Issue fixed
      - PR URL or skipped reason
      - Files changed
      - Validation status
      - Review status
      - Action Memory payload path
      - Follow-up recommendations

      End with `<promise>BORG_NANOPROBE_COMPLETE</promise>`.

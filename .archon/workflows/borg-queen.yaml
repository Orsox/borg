# ═════════════════════════════════════════════════════════════════════
# Borg-Queen v2 — Local-First mit Review-Zyklen
# ═════════════════════════════════════════════════════════════════════
#
# Kostenbewusste Modell-Routing-Strategie:
#   Qwen3.6  → Planen + Implementieren (starkes Thinking, lokal)
#   Gemma4   → Setup, Git, PR-Orchestrierung (schnelle Tool-Calls, lokal)
#   Claude Opus → Unabhängiges Review nach dem Loop
#   GPT 5.5  → Final-Review mit hohem Reasoning
#
# Loop-Pattern (inspiriert von archon-adversarial-dev):
#   Jeder Loop-Durchlauf (fresh context):
#     1. Qwen3.6 implementiert (oder fixt Review-Findings)
#     2. Qwen3.6 macht strengen Self-Review
#     3. Findings → $ARTIFACTS_DIR/review/ → nächster Zyklus
#     4. Bis Self-Review passt oder max 3 Zyklen erreicht
#
# Nach Loop: Claude Opus reviewt → GPT 5.5 final reviewt → PR fertig
# ═════════════════════════════════════════════════════════════════════

name: borg-queen
description: |
  Use when: You have a feature idea or description and want end-to-end development
  with local-first model routing and adversarial review cycles.

  Local-first workflow that maximizes local model usage:
  - Qwen3.6 (local) for planning and implementation with deep thinking
  - Gemma4 (local) for fast mechanical setup/git/PR tasks
  - Claude Opus for independent high-quality review after implementation loop
  - GPT 5.5 with high reasoning for final review

  Input: Feature description in natural language, or path to a PRD file
  Output: PR ready for merge with comprehensive review completed

  Full workflow:
  1. Qwen3.6 creates comprehensive implementation plan
  2. Gemma4 sets up branch and extracts scope limits
  3. Review-Implement Loop (max 3 cycles):
     - Qwen3.6 implements tasks (or fixes self-review findings)
     - Qwen3.6 performs strict self-review
     - On review failure: findings flow back to Qwen for next cycle
  4. Claude Opus performs independent review of final implementation
  5. GPT 5.5 performs final review with high reasoning
  6. Gemma4 finalizes PR
  7. Qwen3.6 generates workflow summary

  NOT for: Executing existing plans (use archon-plan-to-pr), quick fixes, standalone reviews.

provider: pi
model: lm-studio/google/gemma-4-e4b

nodes:
  # ═══════════════════════════════════════════════════════════════════
  # PHASE 0: STATE INIT — bash node prepares tracking files
  # ═══════════════════════════════════════════════════════════════════

  - id: state-init
    bash: |
      set -euo pipefail
      ART="$ARTIFACTS_DIR"
      mkdir -p "$ART/review"

      # Initialize state tracker
      cat > "$ART/state.json" << 'EOF'
      {
        "cycle": 0,
        "maxCycles": 3,
        "reviewPassed": false,
        "status": "running"
      }
      EOF

      echo "State initialized in $ART/state.json"
    timeout: 10000

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 1: CREATE PLAN — Qwen3.6 mit tiefem Thinking
  # ═══════════════════════════════════════════════════════════════════

  - id: create-plan
    command: archon-create-plan
    depends_on: [state-init]
    context: fresh
    provider: pi
    model: lm-studio/qwen/qwen3.6-27b
    idle_timeout: 600000

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 2: SETUP — Gemma4 für mechanische Tasks
  # ═══════════════════════════════════════════════════════════════════

  - id: plan-setup
    command: archon-plan-setup
    depends_on: [create-plan]
    context: fresh
    provider: pi
    model: lm-studio/google/gemma-4-e4b

  - id: confirm-plan
    command: archon-confirm-plan
    depends_on: [plan-setup]
    context: fresh
    provider: pi
    model: lm-studio/google/gemma-4-e4b

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 3: REVIEW-IMPLEMENT LOOP — bis 3 Zyklen
  #
  # Pattern nach archon-adversarial-dev: State-Machine Loop
  # Jeder Loop-Durchlauf (fresh context) liest State von Disk:
  #   1. Qwen3.6 implementiert (oder fixt Review-Findings)
  #   2. Qwen3.6 macht strengen Self-Review
  #   3. Findings → $ARTIFACTS_DIR/review/ → nächster Zyklus
  #   4. Bis Self-Review passt oder max 3 Zyklen erreicht
  #
  # Nach dem Loop: Claude Opus macht unabhängiges Review (Phase 3b)
  #
  # State-Dateien:
  #   $ARTIFACTS_DIR/state.json            → Zyklus-Zähler, Review-Status
  #   $ARTIFACTS_DIR/plan.md              → Implementierungsplan
  #   $ARTIFACTS_DIR/implementation.md     → Implementierungs-Summary
  #   $ARTIFACTS_DIR/review/self-review.md → Qwen Self-Review pro Zyklus
  # ═══════════════════════════════════════════════════════════════════

  - id: review-loop
    depends_on: [confirm-plan]
    idle_timeout: 600000
    provider: pi
    model: lm-studio/qwen/qwen3.6-27b
    loop:
      prompt: |
        # Borg-Queen — Review-Implement Loop

        You are Qwen3.6, working in a review-implement loop.
        **THINK DEEPLY before every action.** Analyze thoroughly, reason step by step.

        ## ── STEP 0: READ STATE (always first) ──────────────────────

        Read `$ARTIFACTS_DIR/state.json` to get current cycle number and status.
        Read `$ARTIFACTS_DIR/plan.md` for the implementation plan.

        Increment the cycle counter:
        ```bash
        python3 -c "
        import json
        with open('$ARTIFACTS_DIR/state.json') as f:
            state = json.load(f)
        state['cycle'] += 1
        with open('$ARTIFACTS_DIR/state.json', 'w') as f:
            json.dump(state, f, indent=2)
        print(f'CYCLE: {state[\"cycle\"]}/{state[\"maxCycles\"]}')
        "
        ```

        ## ── STEP 1: DETERMINE MODE ─────────────────────────────────

        **CYCLE 1 → IMPLEMENT mode:**
        - Explore the codebase thoroughly
        - Implement ALL tasks from the plan
        - Follow existing patterns (read CLAUDE.md for project standards)

        **CYCLE 2+ → FIX mode:**
        - Read self-review findings from `$ARTIFACTS_DIR/review/self-review.md`
        - Fix ALL CRITICAL and HIGH issues from previous cycle
        - Address MEDIUM issues if straightforward
        - Document every fix with before/after explanation

        ## ── STEP 2: IMPLEMENT / FIX ────────────────────────────────

        ### Rules:
        - After each file change: verify types compile
        - After all changes: run full validation suite
        - Never commit broken code
        - Keep changes minimal and focused on the plan

        ### Validation:
        ```bash
        # Backend
        (cd backend && uv run python -m pytest -v) 2>/dev/null || echo "No backend tests"
        # Frontend
        (cd frontend && npm run test) 2>/dev/null || echo "No frontend tests"
        (cd frontend && npm run type-check) 2>/dev/null || echo "No type-check"
        (cd frontend && npm run lint) 2>/dev/null || echo "No lint"
        ```

        Write implementation summary to `$ARTIFACTS_DIR/implementation.md`.

        ## ── STEP 3: STRICT SELF-REVIEW ─────────────────────────────

        **Adopt the mindset of a senior code reviewer.** Be critical and thorough.
        Think deeply about each dimension before scoring.

        Review dimensions:
        1. **Code Quality**: Clean, readable, well-structured? DRY principles?
        2. **Architecture**: Fits existing patterns? Proper separation of concerns?
        3. **Edge Cases**: Error handling? Input validation? Null safety?
        4. **Testing**: Comprehensive? Edge cases covered? Meaningful assertions?
        5. **Security**: SQL injection? XSS? Auth checks? Input sanitization?
        6. **Performance**: N+1 queries? Unnecessary re-renders? Memory leaks?
        7. **Documentation**: Changes documented? Complex logic explained?

        Write self-review to `$ARTIFACTS_DIR/review/self-review.md`:
        ```markdown
        # Self-Review — Cycle {N}

        ## Verdict: PASS / FAIL

        ## CRITICAL Issues (must fix before proceeding)
        - [ ] Issue 1: {description} → {file:line}
        - [ ] Issue 2: {description} → {file:line}

        ## HIGH Issues (should fix)
        - [ ] Issue 1: {description} → {file:line}

        ## MEDIUM Issues (consider fixing)
        - [ ] Issue 1: {description}

        ## LOW Issues (cosmetic)
        - [ ] Issue 1: {description}

        ## Validation Results
        - Tests: pass/fail ({details})
        - Type-check: pass/fail
        - Lint: pass/fail

        ## Readiness for Next Cycle
        - All critical issues resolved: Yes/No
        - Implementation complete per plan: Yes/No
        ```

        **Fix any CRITICAL issues you find BEFORE updating state.**

        ## ── STEP 4: UPDATE STATE ───────────────────────────────────

        ```bash
        python3 -c "
        import json
        with open('$ARTIFACTS_DIR/state.json') as f:
            state = json.load(f)

        # Read self-review to determine pass/fail
        review_file = '$ARTIFACTS_DIR/review/self-review.md'
        try:
            with open(review_file) as f:
                review_text = f.read()
            has_critical = 'CRITICAL' in review_text and '[ ]' in review_text
            # Check if critical issues are unchecked (not fixed)
            critical_section = review_text.split('## CRITICAL')[1].split('##')[0] if '## CRITICAL' in review_text else ''
            unfixed_critical = '[ ]' in critical_section
            state['reviewPassed'] = not unfixed_critical
        except:
            state['reviewPassed'] = False

        with open('$ARTIFACTS_DIR/state.json', 'w') as f:
            json.dump(state, f, indent=2)
        print(f'Review passed: {state[\"reviewPassed\"]}')
        "
        ```

        ## ── STEP 5: COMPLETION CHECK ───────────────────────────────

        If `reviewPassed` is true (no unfixed critical issues) OR cycle >= maxCycles:
        ```
        <promise>REVIEW_COMPLETE</promise>
        ```

        Otherwise, end normally — the loop will continue with self-review
        findings for the next fix cycle.

        ## ── REPORT ─────────────────────────────────────────────────

        ```
        ═══════════════════════════════════════════════════
        CYCLE {N}/{maxCycles} — {IMPLEMENT/FIX} COMPLETE
        ═══════════════════════════════════════════════════
        Tasks completed: {count}
        Files changed: {list}
        Validation: {status}
        Self-review: {verdict}
        Issues: critical={N}, high={N}, medium={N}, low={N}
        ═══════════════════════════════════════════════════
        ```

      until: REVIEW_COMPLETE
      max_iterations: 6
      fresh_context: true
      until_bash: |
        # Exit if review passed OR max cycles reached
        if [ -f "$ARTIFACTS_DIR/review/review-passed" ]; then
          exit 0
        fi
        CYCLES=$(python3 -c "
        import json
        try:
            with open('$ARTIFACTS_DIR/state.json') as f:
                state = json.load(f)
            print(state.get('cycle', 0))
        except: print('0')
        " 2>/dev/null || echo "0")
        if [ "$CYCLES" -ge 3 ]; then
          exit 0
        fi
        exit 1

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 3b: CLAUDE OPUS INDEPENDENT REVIEW
  #
  # Nach dem Loop reviewt Claude Opus die Implementation unabhängig.
  # Dies ist das hochwertige Review-Gate — Claude Opus hat die
  # volle Codebasis und alle Review-Artifacts im Kontext.
  # ═══════════════════════════════════════════════════════════════════

  - id: claude-review
    prompt: |
      # Claude Opus — Independent Code Review

      You are performing an independent, high-quality code review.
      **Think deeply and be thorough.** This is the quality gate.

      ## Load Context

      Read the following artifacts:
      - `$ARTIFACTS_DIR/plan.md` — original implementation plan
      - `$ARTIFACTS_DIR/implementation.md` — what was implemented
      - `$ARTIFACTS_DIR/review/self-review.md` — Qwen's self-review
      - `$ARTIFACTS_DIR/state.json` — loop state (how many cycles ran)

      ## Review the Code

      Examine the actual changed files:
      ```bash
      git log --oneline -10
      git diff --stat HEAD~10
      ```
      Read the key changed files thoroughly.

      ## Review Dimensions

      1. **Correctness**: Does the code do what the plan specified?
      2. **Code Quality**: Clean, readable, maintainable?
      3. **Architecture**: Fits existing patterns? Proper abstractions?
      4. **Robustness**: Error handling? Edge cases? Input validation?
      5. **Testing**: Adequate coverage? Meaningful tests?
      6. **Security**: Any vulnerabilities? Proper auth?
      7. **Performance**: Any obvious inefficiencies?

      ## Write Review

      Write your review to `$ARTIFACTS_DIR/review/claude-opus.md`:
      ```markdown
      # Claude Opus Review

      ## Verdict: PASS / FAIL

      ## Summary
      {overall assessment}

      ## Findings
      ### CRITICAL
      - {issue} → {file:line}

      ### HIGH
      - {issue} → {file:line}

      ### MEDIUM
      - {issue}

      ### LOW
      - {issue}

      ## Cross-Reference with Self-Review
      - Issues Qwen caught correctly: {list}
      - Issues Qwen missed: {list}
      ```

      Be critical. A PASS means the code is genuinely ready for merge.
    depends_on: [review-loop]
    context: fresh
    provider: claude
    model: opus
    effort: high
    thinking: enabled
    idle_timeout: 600000

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 4: FINAL REVIEW — GPT 5.5 mit hohem Reasoning
  # ═══════════════════════════════════════════════════════════════════

  - id: final-review
    prompt: |
      # Final Review — GPT 5.5

      You are performing the FINAL review of this implementation.
      **Use high-level reasoning. Think deeply and thoroughly.**

      ## Your Task

      ### 1. Load Context
      Read the following artifacts:
      - `$ARTIFACTS_DIR/implementation.md` — implementation summary
      - `$ARTIFACTS_DIR/review/claude-opus.md` — Claude Opus review findings
      - `$ARTIFACTS_DIR/review/self-review.md` — Qwen self-review
      - `$ARTIFACTS_DIR/state.json` — loop state (cycle count, review status)

      ### 2. Review Changed Code
      Examine the actual changed files in the repository:
      ```bash
      git log --oneline -10
      git diff --stat HEAD~10
      ```
      Read the key changed files and review them thoroughly.

      ### 3. Comprehensive Review
      Cover all dimensions:
      - Code quality and correctness
      - Architecture and design patterns
      - Security considerations
      - Test coverage
      - Documentation
      - Edge cases and error handling
      - Cross-reference with Claude Opus and self-review findings
      - Verify Claude Opus findings were addressed (if any)

      ### 4. Write Review
      Write your comprehensive review to `$ARTIFACTS_DIR/review/final-review.md`
      with a clear PASS/FAIL verdict and justification.

      Be thorough. This is the last gate before the PR is finalized.
    depends_on: [claude-review]
    context: fresh
    provider: pi
    model: openai/gpt-5.5
    idle_timeout: 600000

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 5: FINALIZE PR — Gemma4 für Git/PR Orchestrierung
  # ═══════════════════════════════════════════════════════════════════

  - id: finalize-pr
    command: archon-finalize-pr
    depends_on: [final-review]
    context: fresh
    provider: pi
    model: lm-studio/google/gemma-4-e4b

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 6: WORKFLOW SUMMARY — Qwen3.6 für Reports
  # ═══════════════════════════════════════════════════════════════════

  - id: workflow-summary
    command: archon-workflow-summary
    depends_on: [finalize-pr]
    context: fresh
    provider: pi
    model: lm-studio/qwen/qwen3.6-27b

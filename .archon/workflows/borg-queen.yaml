name: borg-queen
description: |
  Use when: You have a feature idea or description and want end-to-end development
  with cost-aware model routing.

  Derived from archon-idea-to-pr, but routes work by cognitive load:
  - Claude models for high-thinking planning, implementation, and critical fixes
  - Local Gemma for mechanical setup/git/template tasks
  - Local Qwen for report/summary style work where local capability is sufficient
  - GPT 5.5 with high reasoning for PR review tasks

  Input: Feature description in natural language, or path to a PRD file
  Output: PR ready for merge with comprehensive review completed

  Full workflow:
  1. Create comprehensive implementation plan with codebase analysis
  2. Setup branch and extract scope limits
  3. Verify plan research is still valid
  4. Implement all tasks with type-checking
  5. Run full validation suite
  6. Create PR with template, mark ready
  7. Comprehensive code review with GPT 5.5 high reasoning
  8. Synthesize and fix review findings
  9. Final summary with decision matrix -> GitHub comment + follow-up recommendations

  NOT for: Executing existing plans (use archon-plan-to-pr), quick fixes, standalone reviews.

provider: pi
model: lm-studio/google/gemma-4-e4b

nodes:
  # ═══════════════════════════════════════════════════════════════════
  # PHASE 0: CREATE PLAN — high-thinking Claude
  # ═══════════════════════════════════════════════════════════════════

  - id: create-plan
    command: archon-create-plan
    context: fresh
    provider: claude
    model: sonnet
    effort: high
    thinking: enabled

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 1: SETUP — local Gemma is sufficient
  # ═══════════════════════════════════════════════════════════════════

  - id: plan-setup
    command: archon-plan-setup
    depends_on: [create-plan]
    context: fresh
    provider: pi
    model: lm-studio/google/gemma-4-e4b

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 2: CONFIRM PLAN — local Gemma is sufficient
  # ═══════════════════════════════════════════════════════════════════

  - id: confirm-plan
    command: archon-confirm-plan
    depends_on: [plan-setup]
    context: fresh
    provider: pi
    model: lm-studio/google/gemma-4-e4b

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 3: IMPLEMENT — high-thinking Claude with large context
  # ═══════════════════════════════════════════════════════════════════

  - id: implement-tasks
    command: archon-implement-tasks
    depends_on: [confirm-plan]
    context: fresh
    provider: claude
    model: opus[1m]
    effort: high
    thinking: enabled

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 4: VALIDATE — local Qwen for structured debugging/repair
  # ═══════════════════════════════════════════════════════════════════

  - id: validate
    command: archon-validate
    depends_on: [implement-tasks]
    context: fresh
    provider: pi
    model: lm-studio/qwen/qwen3.6-27b

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 5: FINALIZE PR — local Gemma for git/template orchestration
  # ═══════════════════════════════════════════════════════════════════

  - id: finalize-pr
    command: archon-finalize-pr
    depends_on: [validate]
    context: fresh
    provider: pi
    model: lm-studio/google/gemma-4-e4b

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 6: CODE REVIEW — GPT 5.5 high for review tasks
  # ═══════════════════════════════════════════════════════════════════

  - id: verify-pr-base
    bash: |
      set -euo pipefail
      EXPECTED="$BASE_BRANCH"
      ACTUAL=$(gh pr view --json baseRefName -q '.baseRefName')
      if [ "$ACTUAL" != "$EXPECTED" ]; then
        PR_NUMBER=$(gh pr view --json number -q '.number')
        echo "Base mismatch on PR #$PR_NUMBER: expected=$EXPECTED actual=$ACTUAL — re-targeting" >&2
        gh pr edit "$PR_NUMBER" --base "$EXPECTED"
      else
        echo "PR base verified: $EXPECTED"
      fi
    depends_on: [finalize-pr]

  - id: review-scope
    command: archon-pr-review-scope
    depends_on: [verify-pr-base]
    context: fresh
    provider: pi
    model: lm-studio/google/gemma-4-e4b

  - id: sync
    command: archon-sync-pr-with-main
    depends_on: [review-scope]
    context: fresh
    provider: pi
    model: lm-studio/google/gemma-4-e4b

  - id: code-review
    command: archon-code-review-agent
    depends_on: [sync]
    context: fresh
    provider: pi
    model: openai/gpt-5.5
    effort: high

  - id: error-handling
    command: archon-error-handling-agent
    depends_on: [sync]
    context: fresh
    provider: pi
    model: openai/gpt-5.5
    effort: high

  - id: test-coverage
    command: archon-test-coverage-agent
    depends_on: [sync]
    context: fresh
    provider: pi
    model: openai/gpt-5.5
    effort: high

  - id: comment-quality
    command: archon-comment-quality-agent
    depends_on: [sync]
    context: fresh
    provider: pi
    model: openai/gpt-5.5
    effort: high

  - id: docs-impact
    command: archon-docs-impact-agent
    depends_on: [sync]
    context: fresh
    provider: pi
    model: openai/gpt-5.5
    effort: high

  - id: synthesize
    command: archon-synthesize-review
    depends_on: [code-review, error-handling, test-coverage, comment-quality, docs-impact]
    trigger_rule: one_success
    context: fresh
    provider: pi
    model: openai/gpt-5.5
    effort: high

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 7: FIX REVIEW ISSUES — high-thinking Claude
  # ═══════════════════════════════════════════════════════════════════

  - id: implement-fixes
    command: archon-implement-review-fixes
    depends_on: [synthesize]
    context: fresh
    provider: claude
    model: sonnet
    effort: high
    thinking: enabled

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 8: FINAL SUMMARY & FOLLOW-UP — local Qwen for reports
  # ═══════════════════════════════════════════════════════════════════

  - id: workflow-summary
    command: archon-workflow-summary
    depends_on: [implement-fixes]
    context: fresh
    provider: pi
    model: lm-studio/qwen/qwen3.6-27b

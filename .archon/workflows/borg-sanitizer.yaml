  # в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  # PHASE 3: GENERIERUNG вЂ” qwen3.6-27b, sequenziell, ein Pass
  #
  # all_done: lГ¤uft sobald alle Shards terminal sind (auch bei Shard-Timeout),
  #           arbeitet mit den vorhandenen Analysen. Fehlende Analysen werden
  #           notfalls direkt aus dem Quellcode nachgelesen.
  # в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ

  - id: generate-docs
    depends_on: [analyze-shard-0, analyze-shard-1, analyze-shard-2, analyze-shard-3]
    trigger_rule: all_done
    context: fresh
    provider: pi
    model: lm-studio/qwen/qwen3.6-35b-a3b-mtp
    idle_timeout: 1800000
    prompt: |
      # Borg Sanitizer вЂ” Modul-Dokumentation generieren

      Du bist Qwen3.6. Du schreibst die finalen CLAUDE.md- und borg-cube.md-Dateien
      fГјr jedes Modul. Arbeite primГ¤r aus den vorberechneten Analysen; Г¶ffne den
      Quellcode nur, wenn eine Analyse fehlt oder unklar ist.

      ## Schritt 1 вЂ” Plan laden
      Lies `$ARTIFACTS_DIR/modules/manifest.json`. Pro Modul bekommst du:
      `path`, `slug`, `missing_claude`, `missing_cube`.

      Lies pro Modul die Analyse aus `$ARTIFACTS_DIR/analysis/<slug>.md`.
      Existiert diese Datei nicht, lies kurz selbst den Modul-Quellcode.

      Lies einmal die Root-`CLAUDE.md` fГјr den Projekt-Gesamtkontext.

      ## Schritt 2 вЂ” Dateien schreiben

      ### CLAUDE.md  (nur wenn `missing_claude` true) в†’ schreibe `<path>/CLAUDE.md`

      Pflicht-Header:
      ```
      # CLAUDE.md вЂ” <Modul-Name>

      This file provides guidance to Claude Code (claude.ai/code) and Pi agents
      working in this module.
      ```

      Inhalts-Regeln (Referenz: Claude Code best practices fГјr grosse Codebasen):
      - **Befehle**: modul-spezifische Build-, Test-, Lint-Kommandos
      - **Konventionen**: Coding-Stil, Namensgebung, Patterns die dieses Modul nutzt
      - **Architektur**: SchlГјssel-Entscheidungen (das WARUM, nicht das WAS)
      - **Fallgruben**: bekannte Pitfalls, was man vermeiden muss
      - **Integrationspunkte**: was ruft dieses Modul, was ruft es auf
      - **Invarianten**: nicht-offensichtliche Voraussetzungen

      Was NICHT hinein gehГ¶rt: allgemeine Best Practices, Wiederholung der
      Root-CLAUDE.md, Triviales, Sicherheits-PlatitГјden. LГ¤nge: 30вЂ“80 Zeilen.

      ### borg-cube.md  (nur wenn `missing_cube` true) в†’ schreibe `<path>/borg-cube.md`

      Pflicht-Header:
      ```
      # <Modul-Name> вЂ” Borg Cube Specification
      ```

      Pflicht-Sektionen:
      - **Purpose**: Was dieses Modul tut (ein Absatz)
      - **Public API / Interface**: Routen, exportierte Funktionen, Klassen
      - **Data Models**: wichtige SQLAlchemy-Modelle oder TypeScript-Typen
      - **Dependencies**: Was dieses Modul aufruft / wer es aufruft
      - **Configuration**: Env-Vars, Settings die es liest
      - **Design Decisions**: nicht-offensichtliche Architekturentscheidungen

      LГ¤nge: 40вЂ“120 Zeilen.

      ## Schritt 3 вЂ” Abschluss
      Bearbeite JEDES Modul im Manifest. Erstelle keine Datei, die bereits existiert
      (`missing_*` false). Beende mit `<promise>BORG_SANITIZER_GENERATED</promise>`.

  # в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  # PHASE 4: GIT-STATUS вЂ” deterministisch
  # в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ

  - id: collect-diff
    depends_on: [generate-docs]
    bash: |
      set -euo pipefail
      OUT="$ARTIFACTS_DIR/review/diff.md"
      echo "# Generated Files вЂ” Diff" > "$OUT"
      echo >> "$OUT"
      echo "## Git Status" >> "$OUT"
      echo '```' >> "$OUT"
      git status --short >> "$OUT" || true
      echo '```' >> "$OUT"
      echo >> "$OUT"
      echo "## Created Documentation Files" >> "$OUT"
      git ls-files --others --exclude-standard | grep -E '(CLAUDE|borg-cube)\.md$' | while read -r f; do
        echo "- $f" >> "$OUT"
      done
      git diff --name-only | grep -E '(CLAUDE|borg-cube)\.md$' | while read -r f; do
        echo "- $f (modified)" >> "$OUT"
      done
      cat "$OUT"
    timeout: 30000

  # в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  # PHASE 5: FINAL REVIEW вЂ” Qwen3.6-35B-A3B-MTP
  # в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ

  - id: final-review
    depends_on: [collect-diff]
    context: fresh
    provider: pi
    model: lm-studio/qwen/qwen3.6-35b-a3b-mtp
    effort: high
    idle_timeout: 1800000
    prompt: |
      # Borg Sanitizer вЂ” Final Review

      Du bist der finale Reviewer. PrГјfe die generierten Dokumentationsdateien
      auf QualitГ¤t und Korrektheit. Dies ist die abschlieГџende Qwen-Stufe.

      ## Kontext laden
      - `$ARTIFACTS_DIR/review/diff.md` вЂ” welche Dateien erstellt wurden
      - Lies alle neu erstellten `CLAUDE.md`- und `borg-cube.md`-Dateien
        (`git ls-files --others --exclude-standard` und `git diff --name-only`)
      - Root-`CLAUDE.md` fГјr den Vergleich
      - Stichprobe: lies 1вЂ“2 zugehГ¶rige Quelldateien, um die Genauigkeit zu prГјfen

      ## Review-Kriterien
      ### CLAUDE.md
      - Korrekter Header? Modul-spezifisch statt generisch?
      - Wiederholt nicht die Root-CLAUDE.md?
      - Konkrete Befehle / Konventionen / Pitfalls? Unter 100 Zeilen?
      ### borg-cube.md
      - Korrekter Header? Alle Pflicht-Sektionen?
      - Public API korrekt? Dependencies vollstГ¤ndig? Faktisch korrekt?

      ## Findings beheben
      Wenn eine Datei mangelhaft ist (falsche Struktur, fehlende Sektionen,
      generischer oder falscher Inhalt): verbessere sie direkt.

      ## Review-Bericht schreiben
      Schreibe `$ARTIFACTS_DIR/review/final-review.md` mit:
      - GeprГјfte Dateien
      - Verdict pro Datei: GOOD / IMPROVED / SKIPPED
      - Liste der Verbesserungen
      - Empfehlungen fГјr manuelle Nacharbeit

      Beende mit `<promise>BORG_SANITIZER_REVIEWED</promise>`.

  # в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  # PHASE 6: ZUSAMMENFASSUNG
  # в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ

  - id: summary
    depends_on: [final-review]
    bash: |
      set -euo pipefail

      python3 - << 'PY'
      import json, os, pathlib, datetime

      ART = os.environ["ARTIFACTS_DIR"]
      ROOT = pathlib.Path(".")
      manifest_path = os.path.join(ART, "modules", "manifest.json")

      lines = [
          "# Borg Sanitizer вЂ” Summary",
          "",
          f"Run: {datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')}",
          "",
      ]

      if not os.path.exists(manifest_path):
          lines.append("No manifest found вЂ” nothing was processed.")
      else:
          manifest = json.load(open(manifest_path))
          modules = manifest.get("modules", [])
          lines.append(f"Modules scanned: {manifest.get('total', 0)}")
          lines.append("")

          created, still_missing = [], []
          for m in modules:
              d = ROOT / m["path"]
              made, miss = [], []
              if m.get("missing_claude"):
                  (made if (d / "CLAUDE.md").exists() else miss).append("CLAUDE.md")
              if m.get("missing_cube"):
                  (made if (d / "borg-cube.md").exists() else miss).append("borg-cube.md")
              if made:
                  created.append(f"  - `{m['path']}`: {', '.join(made)}")
              if miss:
                  still_missing.append(f"  - `{m['path']}`: {', '.join(miss)} вЂ” STILL MISSING")

          if created:
              lines.append(f"## Created ({len(created)})")
              lines.extend(created)
              lines.append("")
          if still_missing:
              lines.append(f"## Still Missing ({len(still_missing)})")
              lines.extend(still_missing)
              lines.append("")
          else:
              lines.append("## Status: ALL MODULES DOCUMENTED")

      review_path = os.path.join(ART, "review", "final-review.md")
      if os.path.exists(review_path):
          lines.append("")
          lines.append("---")
          lines.append("## Review Report")
          lines.append(open(review_path).read())

      report = "\n".join(lines)
      with open(os.path.join(ART, "final", "summary.md"), "w") as f:
          f.write(report)
      print(report)
      PY
    timeout: 30000

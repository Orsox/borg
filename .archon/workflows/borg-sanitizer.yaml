      ## Step 3 вЂ” Finish
      After all your modules are analyzed, end with: <promise>SHARD_2_ANALYZED</promise>

  - id: analyze-shard-3
    depends_on: [scan-modules]
    context: fresh
    provider: pi
    model: lm-studio/qwen/qwen3.5-9b
    idle_timeout: 1800000
    prompt: |
      # Borg Sanitizer вЂ” Code Analysis (Shard 3)

      You are a code analyst subagent. Analyze ONLY the modules assigned to you and
      write one factual analysis file per module. Describe only what you actually read.

      ## Step 1 вЂ” Read your assignment
      Read `$ARTIFACTS_DIR/modules/shard-3.json`. It contains a `modules` list; each

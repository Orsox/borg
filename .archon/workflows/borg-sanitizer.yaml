# ═════════════════════════════════════════════════════════════════════
# Borg Sanitizer — Module Documentation Enforcer (project-agnostic)
# ═════════════════════════════════════════════════════════════════════
#
# Ensures every MAIN code module has two mandatory files:
#   CLAUDE.md     → rule-set for coding agents (Claude Code / Pi)
#   borg-cube.md  → module specification, built from borg-cube-template.md
#
# Module discovery (language- and framework-agnostic):
#   SOURCE ROOT  = the outermost directory named like a source container
#                  (src, app, lib, pkg, packages, cmd, internal, services, ...).
#                  Falls back to the repo root if a project has none.
#   MAIN module  = a code-bearing directory one level BELOW a source root
#                  (or a top-level code dir in the fallback case).
#                  → gets its own CLAUDE.md + borg-cube.md.
#   SUBMODULE    = any nested code directory below a main module.
#                  → NO own files; appears as a minimal tree inside the parent cube.
#   Discovery is .gitignore-aware (uses `git check-ignore`) and spans many
#   languages (.py .ts .go .rs .java .rb .php .cs .cpp .svelte .vue ...).
#
# Reference: https://claude.com/blog/how-claude-code-works-in-large-codebases-best-practices-and-where-to-start
#
# Model routing (local-first, Claude for review only):
#   qwen2.5-7b-instruct (local) → up to 4 CONCURRENT data-collection workers that pull
#                                 from a shared work-queue (idle_timeout 5 min)
#   qwen3.6-27b         (local) → documentation generation, sharded + serial
#                                 (one node per shard, ≈2-3 modules each; idle_timeout
#                                  10 min; nodes chained so only one instance runs at a time)
#   Claude Sonnet               → ONLY the final review; also the COMPLETENESS backstop
#                                 (forces a conformant borg-cube.md for every main module)
#
# Dynamic concurrency:
#   The scan counts main modules needing work and computes workers = min(4, N).
#   PHASE 2 is a true work-QUEUE: `workers` qwen2.5 agents run concurrently and each
#   atomically claims the next module via `mkdir` (a filesystem lock), then loops to
#   claim the next — a worker that finishes early picks up more work instead of idling.
#
# Architecture decision:
#   No loop node — loops inherit the workflow default and ignore node-level
#   model/provider; LM-Studio times out internally on heavy loop iterations.
#   Instead: deterministic scan (bash) → dynamic-queue qwen2.5 data collection →
#   serial per-shard qwen3.6 generation (light requests) → Claude review + enforcement.
# ═════════════════════════════════════════════════════════════════════

name: borg-sanitizer
description: |
  Version: 0.1.0

  Ensure every main code module has CLAUDE.md (agent rules) and borg-cube.md (module spec).
  Works on any project/language — module discovery is heuristic and .gitignore-aware.

  Use when: "borg sanitizer", "sanitize docs", "ensure CLAUDE.md", "add module docs",
            "generate borg-cube", "add agent rules", "sanitize modules", "run sanitizer",
            "check module docs", "enforce documentation".

  Does:
  1. Scans the repo, auto-detects source roots, classifies main modules vs nested
     submodules, builds a submodule inventory tree, and queues the main modules needing
     work (deterministic bash, .gitignore-aware).
  2. Runs a dynamic work-queue: up to 4 concurrent qwen2.5-7b workers atomically claim the
     next module (mkdir-lock) and write a compressed analysis, looping until the queue is
     empty — a worker that finishes early immediately picks up the next module.
  3. Serial per-shard qwen3.6-27b generation writes the missing CLAUDE.md / borg-cube.md
     for MAIN modules only, following borg-cube-template.md (provided inline).
  4. Claude Sonnet reviews AND enforces completeness — every main module must end with a
     conformant borg-cube.md (and CLAUDE.md); Claude creates/fixes any that are missing.
  5. Reports what was created.

  CLAUDE.md  — Agent rules: build commands, conventions, architecture decisions,
               pitfalls, integration points. Concise, module-specific only.
  borg-cube.md — Module spec following .archon/templates/borg-cube-template.md;
               submodules appear only as a minimal tree inside the parent cube.

  Reference: https://claude.com/blog/how-claude-code-works-in-large-codebases-best-practices-and-where-to-start

  NOT for: generating the root CLAUDE.md (already handled by /init), deleting files,
           giving submodules their own doc files.

provider: pi
model: lm-studio/qwen/qwen3.6-27b-mtp@q6_k_xl
worktree:
  enabled: true

nodes:
  # ═══════════════════════════════════════════════════════════════════
  # PHASE 0: INIT
  # ═══════════════════════════════════════════════════════════════════

  - id: init
    bash: |
      set -euo pipefail
      mkdir -p "$ARTIFACTS_DIR/modules" \
               "$ARTIFACTS_DIR/analysis" \
               "$ARTIFACTS_DIR/queue/claims" \
               "$ARTIFACTS_DIR/review" \
               "$ARTIFACTS_DIR/final"
      if [ -f ".archon/templates/borg-cube-template.md" ]; then
        echo "Template found: .archon/templates/borg-cube-template.md"
      else
        echo "WARNING: .archon/templates/borg-cube-template.md missing — generation will use a built-in fallback structure."
      fi
      echo "Borg Sanitizer initialized at $ARTIFACTS_DIR"
    timeout: 10000

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 0b: READ TEMPLATE — deterministic, no AI
  #
  # Emits the borg-cube template content on stdout so the generation nodes
  # can receive it INLINE via `$read-template.output` (no reliance on the
  # local model performing a file-read tool call).
  # ═══════════════════════════════════════════════════════════════════

  - id: read-template
    depends_on: [init]
    bash: |
      set -euo pipefail
      TPL=".archon/templates/borg-cube-template.md"
      if [ -f "$TPL" ]; then
        cat "$TPL"
      else
        printf '%s\n' \
          '# <Module Name> — Borg Cube Specification' \
          '' \
          '**Path:** `<path/to/module>`' \
          '**Type:** main module' \
          '' \
          '## 1. Purpose & Scope' \
          '## 2. Responsibilities / Functional Requirements' \
          '## 3. Public Interface / API' \
          '## 4. Data Models' \
          '## 5. Dependencies & Integration Points' \
          '## 6. Configuration' \
          '## 7. Non-Functional Characteristics (ISO/IEC 25010)' \
          '## 8. Design Decisions & Constraints' \
          '## 9. Submodule Structure'
      fi
    timeout: 10000

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 1: MODULE SCAN + LEVEL CLASSIFICATION — deterministic, no AI
  #
  # Auto-detects source roots, classifies main modules vs submodules,
  # builds a submodule inventory, finds missing doc files, assigns a slug
  # + shard, and writes one shard-K.json per analysis subagent. Respects
  # .gitignore. stdout is PURE JSON so downstream `when:` gates can read
  # shards_used reliably.
  # ═══════════════════════════════════════════════════════════════════

  - id: scan-modules
    depends_on: [init]
    bash: |
      set -euo pipefail

      python3 - << 'PY'
      import json, os, pathlib, re, subprocess

      ROOT = pathlib.Path(".")
      ART = os.environ["ARTIFACTS_DIR"]
      NUM_SHARDS = 4
      MAXDEPTH = 6

      # Directory names that mark a "source container". Main modules are the
      # code-bearing dirs one level BELOW the outermost such container.
      SOURCE_ROOT_NAMES = {
          "src", "app", "lib", "pkg", "internal", "packages",
          "cmd", "source", "apps", "services",
      }
      # Tracked noise that .gitignore often does NOT catch (belt-and-suspenders).
      DENY_NAMES = {
          ".git", "node_modules", "__pycache__", ".svelte-kit", "build", "dist",
          "target", "vendor", "bin", "obj", ".next", ".nuxt", ".venv", "venv",
          "env", ".tox", ".mypy_cache", ".pytest_cache", ".ruff_cache", "coverage",
          "migrations", "__snapshots__",
      }
      CODE_EXT = {
          ".py", ".ts", ".tsx", ".js", ".jsx", ".mjs", ".cjs", ".svelte", ".vue",
          ".go", ".rs", ".java", ".kt", ".kts", ".rb", ".php", ".cs", ".cpp",
          ".cc", ".c", ".h", ".hpp", ".scala", ".swift", ".dart", ".ex", ".exs", ".clj",
      }
      INIT_FILES = {"__init__.py"}  # presence-only files that don't count as "code"

      def is_pruned(name):
          return name.startswith(".") or name in DENY_NAMES

      def subdirs(d):
          try:
              return sorted(c for c in d.iterdir() if c.is_dir() and not is_pruned(c.name))
          except (PermissionError, FileNotFoundError):
              return []

      def code_files(d):
          try:
              return sorted(
                  f.name for f in d.iterdir()
                  if f.is_file() and f.suffix in CODE_EXT and f.name not in INIT_FILES
              )
          except (PermissionError, FileNotFoundError):
              return []

      def has_code_recursive(d, depth=0):
          if code_files(d):
              return True
          if depth >= MAXDEPTH:
              return False
          return any(has_code_recursive(sd, depth + 1) for sd in subdirs(d))

      # --- Find outermost source roots -----------------------------
      source_roots = []
      def walk_for_roots(d, depth=0):
          for sd in subdirs(d):
              if sd.name in SOURCE_ROOT_NAMES and has_code_recursive(sd):
                  source_roots.append(sd)          # outermost wins: do not recurse in
              elif depth < MAXDEPTH:
                  walk_for_roots(sd, depth + 1)
      walk_for_roots(ROOT)

      def main_modules_of(root):
          children = [c for c in subdirs(root) if has_code_recursive(c)]
          if children:
              return children
          if code_files(root):
              return [root]
          return []

      # --- Determine main module dirs ------------------------------
      if source_roots:
          main_dirs = []
          for r in source_roots:
              main_dirs.extend(main_modules_of(r))
      else:
          main_dirs = [c for c in subdirs(ROOT) if has_code_recursive(c)]
          if not main_dirs and code_files(ROOT):
              main_dirs = [ROOT]

      seen, uniq = set(), []
      for d in main_dirs:
          if str(d) not in seen:
              seen.add(str(d)); uniq.append(d)
      main_dirs = uniq

      def collect_submodules(main_dir):
          subs = []
          def rec(d, depth=0):
              for sd in subdirs(d):
                  if code_files(sd):
                      subs.append(sd)
                  if depth < MAXDEPTH:
                      rec(sd, depth + 1)
          rec(main_dir)
          return subs

      # --- .gitignore filter (single batched call) -----------------
      def gitignored(paths):
          if not paths:
              return set()
          try:
              subprocess.run(["git", "rev-parse", "--is-inside-work-tree"],
                             cwd=ROOT, check=True, capture_output=True)
          except Exception:
              return set()
          try:
              inp = "\n".join(str(p) for p in paths) + "\n"
              r = subprocess.run(["git", "check-ignore", "--stdin"],
                                 cwd=ROOT, input=inp, capture_output=True, text=True)
              return {ln.strip() for ln in r.stdout.splitlines() if ln.strip()}
          except Exception:
              return set()

      all_subs = {str(d): collect_submodules(d) for d in main_dirs}
      candidates = [str(d) for d in main_dirs]
      for subs in all_subs.values():
          candidates.extend(str(s) for s in subs)
      ignored = gitignored(candidates)
      main_dirs = [d for d in main_dirs if str(d) not in ignored]

      def slug_of(rel):
          return re.sub(r"[^A-Za-z0-9]+", "__", rel).strip("_") or "root"

      modules = []
      for d in main_dirs:
          rel = str(d.relative_to(ROOT)) if d != ROOT else "."
          subs = [s for s in all_subs[str(d)] if str(s) not in ignored]
          df = code_files(d)
          modules.append({
              "path": rel,
              "slug": slug_of(rel),
              "missing_claude": not (d / "CLAUDE.md").exists(),
              "missing_cube":   not (d / "borg-cube.md").exists(),
              "direct_files": df,
              "direct_file_count": len(df),
              "submodules": [
                  {
                      "path": str(s.relative_to(ROOT)),
                      "rel_to_main": str(s.relative_to(d)),
                      "file_count": len(code_files(s)),
                      "files": code_files(s)[:12],
                      "subfolder_count": len(subdirs(s)),
                  }
                  for s in subs
              ],
          })
      for m in modules:
          m["submodule_count"] = len(m["submodules"])

      # --- Modules needing work ------------------------------------
      # `workers`/`shards_used` (same value) = how many concurrent agents to spawn.
      #   - Data collection: a DYNAMIC QUEUE of `workers` agents claim from queue/modules.json.
      #   - Generation: a static round-robin shard partition (shard-K.json), processed serially.
      needing = [m for m in modules if m["missing_claude"] or m["missing_cube"]]
      shards_used = min(NUM_SHARDS, len(needing))
      for i, m in enumerate(needing):
          m["shard"] = (i % shards_used) if shards_used else 0

      total_submodules = sum(m["submodule_count"] for m in modules)

      manifest = {
          "source_roots": [str(r) for r in source_roots],
          "main_modules": modules,
          "total_main": len(modules),
          "needing": len(needing),
          "workers": shards_used,
          "shards_used": shards_used,
          "total_submodules": total_submodules,
          "num_shards": NUM_SHARDS,
      }
      with open(f"{ART}/modules/manifest.json", "w") as f:
          json.dump(manifest, f, indent=2)

      # Flat work queue for the dynamic data-collection workers.
      with open(f"{ART}/queue/modules.json", "w") as f:
          json.dump(needing, f, indent=2)

      # Static shard partitions for the serial generation phase.
      for k in range(NUM_SHARDS):
          shard_mods = [m for m in needing if m.get("shard") == k]
          with open(f"{ART}/modules/shard-{k}.json", "w") as f:
              json.dump({"shard": k, "modules": shard_mods}, f, indent=2)

      # --- Human-readable report (NOT stdout) ----------------------
      lines = [
          f"Source roots: {', '.join(str(r) for r in source_roots) or '(none — repo root)'}",
          f"Main modules: {len(modules)}  |  needing docs: {len(needing)}  |  "
          f"submodules: {total_submodules}  |  shards used: {shards_used}",
          "",
      ]
      for m in modules:
          miss = []
          if m["missing_claude"]: miss.append("CLAUDE.md")
          if m["missing_cube"]:   miss.append("borg-cube.md")
          status = f"missing: {', '.join(miss)}" if miss else "OK (documented)"
          shard = f" [shard {m['shard']}]" if "shard" in m else ""
          lines.append(f"- {m['path']}{shard}  →  {status}  ({m['submodule_count']} submodules)")
          for s in m["submodules"]:
              lines.append(f"    · {s['rel_to_main']}  ({s['file_count']} files)")
      with open(f"{ART}/modules/scan-report.txt", "w") as f:
          f.write("\n".join(lines) + "\n")

      # --- stdout: PURE JSON for downstream `when:` gates ----------
      print(json.dumps({
          "main_modules": len(needing),
          "workers": shards_used,
          "shards_used": shards_used,
          "submodules": total_submodules,
      }))
      PY
    timeout: 30000

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 2: DATA COLLECTION — dynamic work-queue, up to 4× qwen2.5
  #
  # Up to 4 worker nodes run CONCURRENTLY and pull modules from a shared
  # queue. Each worker atomically claims the next unprocessed module with
  # `mkdir` (an atomic filesystem lock) and writes its analysis, then loops
  # to claim the next — so a worker that finishes early immediately picks up
  # more work instead of idling. `when:` on `workers` (= min(4, N)) spawns
  # only as many workers as there are modules.
  # ═══════════════════════════════════════════════════════════════════

  - id: analysis-worker-0
    depends_on: [scan-modules]
    when: "$scan-modules.output.workers >= '1'"
    context: fresh
    provider: pi
    model: lm-studio/qwen2.5-7b-instruct
    idle_timeout: 300000
    retry:
      max_attempts: 5
      on_error: all
    fallbackModel: lm-studio/qwen/qwen3.6-27b-mtp@q6_k_xl
    prompt: |
      # Borg Sanitizer — Data-Collection Worker 0 (dynamic queue)

      You are one of several code-analyst workers running CONCURRENTLY. You repeatedly
      CLAIM the next unprocessed module from a shared queue and write one COMPRESSED analysis per
      module, until nothing is left to claim. Claims are atomic via `mkdir`. The project may be
      in any language — adapt to whatever you find.

      ## Hard rules (NEVER violate)
      - The ONLY file you ever create or modify is `$ARTIFACTS_DIR/analysis/<slug>.md`.
      - You ANALYZE existing code — you do NOT write code. Reading source is fine; writing or
        editing ANY source file, README, config, or `queue/`/`modules/` file is forbidden.
      - NEVER write to an absolute path such as `/backend/...`. Use ONLY the literal
        `$ARTIFACTS_DIR/analysis/<slug>.md` path (it already expands to an absolute path).
      - If a write fails, do NOT repeat the same failing write. Verify the target path is exactly
        `$ARTIFACTS_DIR/analysis/<slug>.md`; if it still fails once, skip that module and continue.
      - Never invent placeholder source files. If a module's source is empty or unreadable, say so
        in the analysis and move on.

      ## The queue
      - Module list: `$ARTIFACTS_DIR/queue/modules.json` — a JSON array; each item has
        `slug`, `path`, `direct_files`, `submodules`, `missing_claude`, `missing_cube`.
      - Claim locks live under `$ARTIFACTS_DIR/queue/claims/<slug>` (a directory).

      ## Work loop — repeat until you cannot claim anything
      1. Read `$ARTIFACTS_DIR/queue/modules.json`.
      2. Find the next item whose analysis file `$ARTIFACTS_DIR/analysis/<slug>.md` does NOT
         exist yet, and try to claim it atomically with bash:
             mkdir "$ARTIFACTS_DIR/queue/claims/<slug>" 2>/dev/null && echo CLAIMED || echo TAKEN
         - `CLAIMED` → this module is YOURS; analyze it (step 3).
         - `TAKEN` → if `$ARTIFACTS_DIR/analysis/<slug>.md` exists, another worker finished it —
           skip it. If that file does NOT exist, a previous attempt died holding the claim, so
           analyze it anyway (re-writing the same analysis file is safe).
      3. Analyze the claimed module (path = its `path`):
         - Read the source files DIRECTLY inside `<path>` (its `direct_files`). Do NOT recurse
           into submodule source.
         - Write `$ARTIFACTS_DIR/analysis/<slug>.md` with EXACTLY these sections (terse):

           # Analysis: <path>

           ## Purpose
           2-3 sentences: what this module does and its boundary.

           ## Public Interface
           Public entry points: exported functions/classes, HTTP routes, RPC/CLI handlers,
           events — with signatures.

           ## Data Models
           Key persisted models, schemas, or core types defined here. Write "none" if none.

           ## Dependencies
           What it imports from other project modules; what calls it if visible; external systems.

           ## Configuration
           Env vars / settings / flags it reads. Write "none" if none.

           ## Commands
           Module-specific build/test/lint commands. Write "inherits root" if none.

           ## Conventions and Pitfalls
           Patterns and gotchas observed in the code (compressed).

           ## Submodules
           From the item's `submodules` list (DO NOT re-walk the tree). One line per submodule:
           `<rel_to_main> — <one-line purpose> (<file_count> files; key: <main file/export>)`.
           Write "none" if the list is empty.
      4. Go back to step 1 and claim the next module.

      ## Finish
      When you can no longer claim anything (every module is claimed or already analyzed),
      STOP and end with: <promise>WORKER_0_DONE</promise>

  - id: analysis-worker-1
    depends_on: [scan-modules]
    when: "$scan-modules.output.workers >= '2'"
    context: fresh
    provider: pi
    model: lm-studio/qwen2.5-7b-instruct
    idle_timeout: 300000
    retry:
      max_attempts: 5
      on_error: all
    fallbackModel: lm-studio/qwen/qwen3.6-27b-mtp@q6_k_xl
    prompt: |
      # Borg Sanitizer — Data-Collection Worker 1 (dynamic queue)

      You are one of several code-analyst workers running CONCURRENTLY. You repeatedly
      CLAIM the next unprocessed module from a shared queue and write one COMPRESSED analysis per
      module, until nothing is left to claim. Claims are atomic via `mkdir`. The project may be
      in any language — adapt to whatever you find.

      ## Hard rules (NEVER violate)
      - The ONLY file you ever create or modify is `$ARTIFACTS_DIR/analysis/<slug>.md`.
      - You ANALYZE existing code — you do NOT write code. Reading source is fine; writing or
        editing ANY source file, README, config, or `queue/`/`modules/` file is forbidden.
      - NEVER write to an absolute path such as `/backend/...`. Use ONLY the literal
        `$ARTIFACTS_DIR/analysis/<slug>.md` path (it already expands to an absolute path).
      - If a write fails, do NOT repeat the same failing write. Verify the target path is exactly
        `$ARTIFACTS_DIR/analysis/<slug>.md`; if it still fails once, skip that module and continue.
      - Never invent placeholder source files. If a module's source is empty or unreadable, say so
        in the analysis and move on.

      ## The queue
      - Module list: `$ARTIFACTS_DIR/queue/modules.json` — a JSON array; each item has
        `slug`, `path`, `direct_files`, `submodules`, `missing_claude`, `missing_cube`.
      - Claim locks live under `$ARTIFACTS_DIR/queue/claims/<slug>` (a directory).

      ## Work loop — repeat until you cannot claim anything
      1. Read `$ARTIFACTS_DIR/queue/modules.json`.
      2. Find the next item whose analysis file `$ARTIFACTS_DIR/analysis/<slug>.md` does NOT
         exist yet, and try to claim it atomically with bash:
             mkdir "$ARTIFACTS_DIR/queue/claims/<slug>" 2>/dev/null && echo CLAIMED || echo TAKEN
         - `CLAIMED` → this module is YOURS; analyze it (step 3).
         - `TAKEN` → if `$ARTIFACTS_DIR/analysis/<slug>.md` exists, another worker finished it —
           skip it. If that file does NOT exist, a previous attempt died holding the claim, so
           analyze it anyway (re-writing the same analysis file is safe).
      3. Analyze the claimed module (path = its `path`):
         - Read the source files DIRECTLY inside `<path>` (its `direct_files`). Do NOT recurse
           into submodule source.
         - Write `$ARTIFACTS_DIR/analysis/<slug>.md` with EXACTLY these sections (terse):

           # Analysis: <path>

           ## Purpose
           2-3 sentences: what this module does and its boundary.

           ## Public Interface
           Public entry points: exported functions/classes, HTTP routes, RPC/CLI handlers,
           events — with signatures.

           ## Data Models
           Key persisted models, schemas, or core types defined here. Write "none" if none.

           ## Dependencies
           What it imports from other project modules; what calls it if visible; external systems.

           ## Configuration
           Env vars / settings / flags it reads. Write "none" if none.

           ## Commands
           Module-specific build/test/lint commands. Write "inherits root" if none.

           ## Conventions and Pitfalls
           Patterns and gotchas observed in the code (compressed).

           ## Submodules
           From the item's `submodules` list (DO NOT re-walk the tree). One line per submodule:
           `<rel_to_main> — <one-line purpose> (<file_count> files; key: <main file/export>)`.
           Write "none" if the list is empty.
      4. Go back to step 1 and claim the next module.

      ## Finish
      When you can no longer claim anything (every module is claimed or already analyzed),
      STOP and end with: <promise>WORKER_1_DONE</promise>

  - id: analysis-worker-2
    depends_on: [scan-modules]
    when: "$scan-modules.output.workers >= '3'"
    context: fresh
    provider: pi
    model: lm-studio/qwen2.5-7b-instruct
    idle_timeout: 300000
    retry:
      max_attempts: 5
      on_error: all
    fallbackModel: lm-studio/qwen/qwen3.6-27b-mtp@q6_k_xl
    prompt: |
      # Borg Sanitizer — Data-Collection Worker 2 (dynamic queue)

      You are one of several code-analyst workers running CONCURRENTLY. You repeatedly
      CLAIM the next unprocessed module from a shared queue and write one COMPRESSED analysis per
      module, until nothing is left to claim. Claims are atomic via `mkdir`. The project may be
      in any language — adapt to whatever you find.

      ## Hard rules (NEVER violate)
      - The ONLY file you ever create or modify is `$ARTIFACTS_DIR/analysis/<slug>.md`.
      - You ANALYZE existing code — you do NOT write code. Reading source is fine; writing or
        editing ANY source file, README, config, or `queue/`/`modules/` file is forbidden.
      - NEVER write to an absolute path such as `/backend/...`. Use ONLY the literal
        `$ARTIFACTS_DIR/analysis/<slug>.md` path (it already expands to an absolute path).
      - If a write fails, do NOT repeat the same failing write. Verify the target path is exactly
        `$ARTIFACTS_DIR/analysis/<slug>.md`; if it still fails once, skip that module and continue.
      - Never invent placeholder source files. If a module's source is empty or unreadable, say so
        in the analysis and move on.

      ## The queue
      - Module list: `$ARTIFACTS_DIR/queue/modules.json` — a JSON array; each item has
        `slug`, `path`, `direct_files`, `submodules`, `missing_claude`, `missing_cube`.
      - Claim locks live under `$ARTIFACTS_DIR/queue/claims/<slug>` (a directory).

      ## Work loop — repeat until you cannot claim anything
      1. Read `$ARTIFACTS_DIR/queue/modules.json`.
      2. Find the next item whose analysis file `$ARTIFACTS_DIR/analysis/<slug>.md` does NOT
         exist yet, and try to claim it atomically with bash:
             mkdir "$ARTIFACTS_DIR/queue/claims/<slug>" 2>/dev/null && echo CLAIMED || echo TAKEN
         - `CLAIMED` → this module is YOURS; analyze it (step 3).
         - `TAKEN` → if `$ARTIFACTS_DIR/analysis/<slug>.md` exists, another worker finished it —
           skip it. If that file does NOT exist, a previous attempt died holding the claim, so
           analyze it anyway (re-writing the same analysis file is safe).
      3. Analyze the claimed module (path = its `path`):
         - Read the source files DIRECTLY inside `<path>` (its `direct_files`). Do NOT recurse
           into submodule source.
         - Write `$ARTIFACTS_DIR/analysis/<slug>.md` with EXACTLY these sections (terse):

           # Analysis: <path>

           ## Purpose
           2-3 sentences: what this module does and its boundary.

           ## Public Interface
           Public entry points: exported functions/classes, HTTP routes, RPC/CLI handlers,
           events — with signatures.

           ## Data Models
           Key persisted models, schemas, or core types defined here. Write "none" if none.

           ## Dependencies
           What it imports from other project modules; what calls it if visible; external systems.

           ## Configuration
           Env vars / settings / flags it reads. Write "none" if none.

           ## Commands
           Module-specific build/test/lint commands. Write "inherits root" if none.

           ## Conventions and Pitfalls
           Patterns and gotchas observed in the code (compressed).

           ## Submodules
           From the item's `submodules` list (DO NOT re-walk the tree). One line per submodule:
           `<rel_to_main> — <one-line purpose> (<file_count> files; key: <main file/export>)`.
           Write "none" if the list is empty.
      4. Go back to step 1 and claim the next module.

      ## Finish
      When you can no longer claim anything (every module is claimed or already analyzed),
      STOP and end with: <promise>WORKER_2_DONE</promise>

  - id: analysis-worker-3
    depends_on: [scan-modules]
    when: "$scan-modules.output.workers >= '4'"
    context: fresh
    provider: pi
    model: lm-studio/qwen2.5-7b-instruct
    idle_timeout: 300000
    retry:
      max_attempts: 5
      on_error: all
    fallbackModel: lm-studio/qwen/qwen3.6-27b-mtp@q6_k_xl
    prompt: |
      # Borg Sanitizer — Data-Collection Worker 3 (dynamic queue)

      You are one of several code-analyst workers running CONCURRENTLY. You repeatedly
      CLAIM the next unprocessed module from a shared queue and write one COMPRESSED analysis per
      module, until nothing is left to claim. Claims are atomic via `mkdir`. The project may be
      in any language — adapt to whatever you find.

      ## Hard rules (NEVER violate)
      - The ONLY file you ever create or modify is `$ARTIFACTS_DIR/analysis/<slug>.md`.
      - You ANALYZE existing code — you do NOT write code. Reading source is fine; writing or
        editing ANY source file, README, config, or `queue/`/`modules/` file is forbidden.
      - NEVER write to an absolute path such as `/backend/...`. Use ONLY the literal
        `$ARTIFACTS_DIR/analysis/<slug>.md` path (it already expands to an absolute path).
      - If a write fails, do NOT repeat the same failing write. Verify the target path is exactly
        `$ARTIFACTS_DIR/analysis/<slug>.md`; if it still fails once, skip that module and continue.
      - Never invent placeholder source files. If a module's source is empty or unreadable, say so
        in the analysis and move on.

      ## The queue
      - Module list: `$ARTIFACTS_DIR/queue/modules.json` — a JSON array; each item has
        `slug`, `path`, `direct_files`, `submodules`, `missing_claude`, `missing_cube`.
      - Claim locks live under `$ARTIFACTS_DIR/queue/claims/<slug>` (a directory).

      ## Work loop — repeat until you cannot claim anything
      1. Read `$ARTIFACTS_DIR/queue/modules.json`.
      2. Find the next item whose analysis file `$ARTIFACTS_DIR/analysis/<slug>.md` does NOT
         exist yet, and try to claim it atomically with bash:
             mkdir "$ARTIFACTS_DIR/queue/claims/<slug>" 2>/dev/null && echo CLAIMED || echo TAKEN
         - `CLAIMED` → this module is YOURS; analyze it (step 3).
         - `TAKEN` → if `$ARTIFACTS_DIR/analysis/<slug>.md` exists, another worker finished it —
           skip it. If that file does NOT exist, a previous attempt died holding the claim, so
           analyze it anyway (re-writing the same analysis file is safe).
      3. Analyze the claimed module (path = its `path`):
         - Read the source files DIRECTLY inside `<path>` (its `direct_files`). Do NOT recurse
           into submodule source.
         - Write `$ARTIFACTS_DIR/analysis/<slug>.md` with EXACTLY these sections (terse):

           # Analysis: <path>

           ## Purpose
           2-3 sentences: what this module does and its boundary.

           ## Public Interface
           Public entry points: exported functions/classes, HTTP routes, RPC/CLI handlers,
           events — with signatures.

           ## Data Models
           Key persisted models, schemas, or core types defined here. Write "none" if none.

           ## Dependencies
           What it imports from other project modules; what calls it if visible; external systems.

           ## Configuration
           Env vars / settings / flags it reads. Write "none" if none.

           ## Commands
           Module-specific build/test/lint commands. Write "inherits root" if none.

           ## Conventions and Pitfalls
           Patterns and gotchas observed in the code (compressed).

           ## Submodules
           From the item's `submodules` list (DO NOT re-walk the tree). One line per submodule:
           `<rel_to_main> — <one-line purpose> (<file_count> files; key: <main file/export>)`.
           Write "none" if the list is empty.
      4. Go back to step 1 and claim the next module.

      ## Finish
      When you can no longer claim anything (every module is claimed or already analyzed),
      STOP and end with: <promise>WORKER_3_DONE</promise>

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 3: GENERATION — qwen3.6-27b, ONE MODULE PER ITERATION (loop)
  #
  # Root cause of the prior timeouts: a generation node's conversation grew
  # across modules and turns, and LM Studio's prefill (prompt processing) of
  # the grown prompt exceeded the client's ~5-min time-to-first-byte limit —
  # which is NOT configurable under the bun runtime that drives Archon (bun's
  # native fetch ignores undici dispatcher timeouts). The request was killed
  # mid-prefill, every time. Fix: a loop with `fresh_context` — each iteration
  # starts with an EMPTY conversation and documents exactly ONE main module,
  # so every request's prompt stays small and prefill finishes in seconds.
  # Loop nodes inherit the workflow default model (qwen3.6), which is correct
  # here. The template is injected INLINE via `$read-template.output`.
  # ═══════════════════════════════════════════════════════════════════

  - id: generate-docs
    depends_on: [analysis-worker-0, analysis-worker-1, analysis-worker-2, analysis-worker-3, read-template, scan-modules]
    when: "$scan-modules.output.main_modules >= '1'"
    trigger_rule: all_done
    loop:
      fresh_context: true
      max_iterations: 60
      until: BORG_ALL_MODULES_GENERATED
      prompt: |
        # Borg Sanitizer — Generate Module Documentation (ONE module per run)

        You are Qwen3.6. Each run you complete the docs for EXACTLY ONE main module,
        then stop. You start with a clean context every run. The project may be in
        any language. Work primarily from the pre-computed analysis.

        ## Step 1 — Pick the next pending module
        Read `$ARTIFACTS_DIR/modules/manifest.json`. Its `main_modules` array lists every
        main module; each has `path`, `slug`, and `submodules`.
        Going through the array IN ORDER, check the filesystem for each module:
          - does `<path>/CLAUDE.md` exist?
          - does `<path>/borg-cube.md` exist?
        Select the FIRST module that is missing AT LEAST ONE of those two files.
        If EVERY main module already has BOTH files: output exactly
        `BORG_ALL_MODULES_GENERATED` and STOP — write nothing else, create no files.

        ## Step 2 — Load only that module's analysis
        Read `$ARTIFACTS_DIR/analysis/<slug>.md` (short). Open the module source only if
        the analysis is missing or unclear. Do NOT read other modules.

        ## Step 3 — Write the missing file(s) for THAT ONE module only
        Never recreate a file that already exists. NEVER create files for submodules.

        ### CLAUDE.md  (only if `<path>/CLAUDE.md` is missing) → write `<path>/CLAUDE.md`
        Mandatory header:
        ```
        # CLAUDE.md — <Module Name>

        This file provides guidance to Claude Code (claude.ai/code) and Pi agents
        working in this module.
        ```
        Sections: Commands, Conventions, Architecture (the WHY), Pitfalls, Integration
        points, Invariants. Exclude generic best practices, root-CLAUDE.md repetition,
        trivia. Length: 30–80 lines.

        ### borg-cube.md  (only if `<path>/borg-cube.md` is missing) → write `<path>/borg-cube.md`
        Follow the template below EXACTLY: same section headers and order, replace every
        <PLACEHOLDER>, delete the HTML comments, fill in only the applicable ISO/IEC 25010
        non-functional rows (mark the rest "N/A"). The submodule-structure section MUST list
        this module's submodules as the minimal tree from the manifest (one line each:
        path · purpose · file count). Write "none" if it has no submodules. 40–120 lines.
        ----- TEMPLATE START -----
        $read-template.output
        ----- TEMPLATE END -----

        ## Step 4 — Finish this run
        After writing the file(s) for your ONE module, output `MODULE_DONE <path>` and stop.
        Output `BORG_ALL_MODULES_GENERATED` ONLY when Step 1 found no pending module.

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 4: GIT STATUS — deterministic
  # ═══════════════════════════════════════════════════════════════════

  - id: collect-diff
    depends_on: [generate-docs]
    trigger_rule: all_done
    bash: |
      set -euo pipefail
      OUT="$ARTIFACTS_DIR/review/diff.md"
      echo "# Generated Files — Diff" > "$OUT"
      echo >> "$OUT"
      echo "## Git Status" >> "$OUT"
      echo '```' >> "$OUT"
      git status --short >> "$OUT" || true
      echo '```' >> "$OUT"
      echo >> "$OUT"
      echo "## Created Documentation Files" >> "$OUT"
      git ls-files --others --exclude-standard | grep -E '(CLAUDE|borg-cube)\.md$' | while read -r f; do
        echo "- $f" >> "$OUT"
      done || true
      git diff --name-only | grep -E '(CLAUDE|borg-cube)\.md$' | while read -r f; do
        echo "- $f (modified)" >> "$OUT"
      done || true
      cat "$OUT"
    timeout: 30000

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 5: FINAL REVIEW — Claude Sonnet (the only Claude usage)
  # ═══════════════════════════════════════════════════════════════════

  - id: final-review
    depends_on: [collect-diff]
    context: fresh
    provider: claude
    model: sonnet
    effort: high
    idle_timeout: 900000
    prompt: |
      # Borg Sanitizer — Final Review & Completeness Enforcement

      You are the final reviewer AND the completeness backstop. The local generation models may
      have skipped or timed out on some modules — it is YOUR job to GUARANTEE the end state.
      This is the only Claude stage. You have full Write/Edit access; fix everything yourself.

      ## Load context
      - `$ARTIFACTS_DIR/modules/manifest.json` — the AUTHORITATIVE list of main modules
        (`main_modules`: each has `path`, `slug`, `missing_claude`, `missing_cube`, `submodules`).
      - `$ARTIFACTS_DIR/review/diff.md` — which files generation already created
      - `$ARTIFACTS_DIR/analysis/<slug>.md` — the per-module analyses (source of facts)
      - `.archon/templates/borg-cube-template.md` — the canonical borg-cube.md structure
      - Root `CLAUDE.md` for comparison (if present)
      - Spot-check: read 1–2 source files per module to verify accuracy

      ## MANDATORY: every main module MUST end with both files
      Iterate EVERY entry in `manifest.json` → `main_modules`. For each module `<path>`:
      1. `<path>/borg-cube.md` MUST exist and conform to borg-cube-template.md (all sections,
         correct order, placeholders replaced, applicable ISO/IEC 25010 rows filled or "N/A",
         and a Submodule Structure tree listing its `submodules` — "none" if it has none).
         If it is MISSING or non-conformant → CREATE/REWRITE it now, using the analysis and
         (if needed) the source. This is non-negotiable: do not finish with any module lacking
         a valid borg-cube.md.
      2. `<path>/CLAUDE.md` MUST exist with the correct header, be module-specific (not a copy
         of the root CLAUDE.md), and contain concrete commands/conventions/pitfalls (<100 lines).
         If missing or deficient → CREATE/REWRITE it now.

      ## Level separation (critical)
      - NO submodule has its own CLAUDE.md or borg-cube.md. If generation wrongly created one,
        delete it and fold its content into the parent module's borg-cube.md tree.
      - Each main module's borg-cube.md Submodule Structure section lists its submodules.

      ## Write the review report
      Write `$ARTIFACTS_DIR/review/final-review.md` with:
      - Per-module table: borg-cube.md = PRESENT-GOOD / IMPROVED / CREATED-BY-REVIEWER;
        CLAUDE.md = same scale
      - Confirmation line: "Every main module has a conformant borg-cube.md: YES/NO"
        (it MUST be YES — if not, keep fixing)
      - Level-separation check result
      - Recommendations for manual follow-up

      End with `<promise>BORG_SANITIZER_REVIEWED</promise>`.

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 6: SUMMARY
  # ═══════════════════════════════════════════════════════════════════

  - id: summary
    depends_on: [final-review]
    bash: |
      set -euo pipefail

      python3 - << 'PY'
      import json, os, pathlib, datetime

      ART = os.environ["ARTIFACTS_DIR"]
      ROOT = pathlib.Path(".")
      manifest_path = os.path.join(ART, "modules", "manifest.json")

      lines = [
          "# Borg Sanitizer — Summary",
          "",
          f"Run: {datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')}",
          "",
      ]

      if not os.path.exists(manifest_path):
          lines.append("No manifest found — nothing was processed.")
      else:
          manifest = json.load(open(manifest_path))
          modules = manifest.get("main_modules", [])
          roots = manifest.get("source_roots", [])
          lines.append(f"Source roots: {', '.join(roots) or '(repo root)'}")
          lines.append(
              f"Main modules: {manifest.get('total_main', 0)}  |  "
              f"needing docs: {manifest.get('needing', 0)}  |  "
              f"submodules: {manifest.get('total_submodules', 0)}  |  "
              f"shards used: {manifest.get('shards_used', 0)}"
          )
          lines.append("")

          created, still_missing = [], []
          for m in modules:
              d = ROOT / m["path"]
              made, miss = [], []
              if m.get("missing_claude"):
                  (made if (d / "CLAUDE.md").exists() else miss).append("CLAUDE.md")
              if m.get("missing_cube"):
                  (made if (d / "borg-cube.md").exists() else miss).append("borg-cube.md")
              if made:
                  created.append(f"  - `{m['path']}`: {', '.join(made)}")
              if miss:
                  still_missing.append(f"  - `{m['path']}`: {', '.join(miss)} — STILL MISSING")

          if created:
              lines.append(f"## Created ({len(created)})")
              lines.extend(created)
              lines.append("")
          if still_missing:
              lines.append(f"## Still Missing ({len(still_missing)})")
              lines.extend(still_missing)
              lines.append("")
          else:
              lines.append("## Status: ALL MAIN MODULES DOCUMENTED")

      review_path = os.path.join(ART, "review", "final-review.md")
      if os.path.exists(review_path):
          lines.append("")
          lines.append("---")
          lines.append("## Review Report")
          lines.append(open(review_path).read())

      report = "\n".join(lines)
      with open(os.path.join(ART, "final", "summary.md"), "w") as f:
          f.write(report)
      print(report)
      PY
    timeout: 30000

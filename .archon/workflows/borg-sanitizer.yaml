# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# Borg Sanitizer вЂ” Modul-Dokumentations-Enforcer
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
#
# Sichert, dass jedes Code-Modul zwei Pflicht-Dateien hat:
#   CLAUDE.md       в†’ Regelwerk fГјr Coding-Agenten (Claude Code / Pi)
#   borg-cube.md    в†’ Spezifikation des Moduls / Bereichs
#
# Referenz: https://claude.com/blog/how-claude-code-works-in-large-codebases-best-practices-and-where-to-start
#
# Model-Routing (lokal-first, Qwen-only):
#   qwen3.5-9b (lokal) в†’ bis zu 4 parallele Analyse-Subagenten
#                                  (idle_timeout 30 min, konsistent mit allen Workflows)
#   qwen3.6-27b-mtp     (lokal) в†’ Dokumentation generieren, sequenziell
#                                  (idle_timeout 30 min, grosses Modell, nur 1 Instanz)
#   Qwen3.6-35B-A3B-MTP       в†’ abschliessende Quality-Review
#
# Architektur-Entscheidung:
#   Kein Loop-Node вЂ” Loops erben den Workflow-Default und ignorieren node-level
#   model/provider; LM-Studio timeouted intern bei schweren Loop-Iterationen.
#   Stattdessen: deterministisches Sharding (bash) в†’ parallele qwen3.5-9b-Analyse
#   в†’ ein qwen3.6-mtp-Generierungspass aus vorverdauten Analysen. Das hГ¤lt jeden
#   einzelnen Node leicht und unterhalb der LM-Studio-Timeouts.
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ

name: borg-sanitizer
description: |
  Ensure every code module has CLAUDE.md (agent rules) and borg-cube.md (module spec).

  Use when: "borg sanitizer", "sanitize docs", "ensure CLAUDE.md", "add module docs",
            "generate borg-cube", "add agent rules", "sanitize modules", "run sanitizer",
            "check module docs", "enforce documentation".

  Does:
  1. Scans the repo for all code modules and splits them into 4 shards (deterministic bash).
  2. Up to 4 parallel qwen3.5-9b analysis subagents read their shard and write factual
     per-module analyses (purpose, public API, data models, deps, config, pitfalls).
  3. A single sequential qwen3.6-27b-mtp pass writes the missing CLAUDE.md / borg-cube.md
     files from the pre-computed analyses.
  4. Qwen3.6-35B-A3B-MTP performs the final quality-review.
  5. Reports what was created.

  CLAUDE.md  вЂ” Agent rules: build commands, conventions, architecture decisions,
               pitfalls, integration points. Concise, module-specific only.
  borg-cube.md вЂ” Module spec: purpose, public API, data models, config, dependencies.

  Reference: https://claude.com/blog/how-claude-code-works-in-large-codebases-best-practices-and-where-to-start

  NOT for: generating the root CLAUDE.md (already handled by /init), deleting files,
           modifying existing documentation.

provider: pi
model: lm-studio/qwen/qwen3.6-35b-a3b-mtp
worktree:
  enabled: true

nodes:
  # в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  # PHASE 0: INIT
  # в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ

  - id: init
    bash: |
      set -euo pipefail
      mkdir -p "$ARTIFACTS_DIR/modules" \
               "$ARTIFACTS_DIR/analysis" \
               "$ARTIFACTS_DIR/review" \
               "$ARTIFACTS_DIR/final"
      echo "Borg Sanitizer initialized at $ARTIFACTS_DIR"
    timeout: 10000

  # в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  # PHASE 1: MODUL-SCAN + SHARDING вЂ” deterministisch, kein KI
  #
  # Findet Module, ermittelt fehlende Doku-Dateien, vergibt einen Slug
  # (sicherer Dateiname) und einen Shard (0..3) pro Modul, und schreibt
  # eine shard-K.json pro Analyse-Subagent.
  # в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ

  - id: scan-modules
    depends_on: [init]
    bash: |
      set -euo pipefail

      python3 - << 'PY'
      import json, os, pathlib, re

      ROOT = pathlib.Path(".")
      ART = os.environ["ARTIFACTS_DIR"]
      NUM_SHARDS = 4

      # Verzeichnisse, die nie als Module gelten
      EXCLUDE_DIRS = {
          "__pycache__", "node_modules", ".git", ".venv", "venv",
          ".svelte-kit", "build", "dist", ".pytest_cache",
          "workspaces", "reset-backups", "run-logs", "logs",
          ".rpiv", ".pi",
      }
      # Versteckte Verzeichnisse (Ausnahmen: Root-Level .archon/.claude sind ok als Roots)
      EXCLUDE_PREFIXES = (".archon", ".claude", ".agent")

      CODE_EXT = {".py", ".ts", ".svelte", ".js"}
      MIN_CODE_FILES = 2  # mind. 2 Code-Dateien (ausser __init__.py)

      def is_excluded_path(rel: pathlib.Path) -> bool:
          for part in rel.parts:
              if part in EXCLUDE_DIRS:
                  return True
              if any(part.startswith(pf) and part != pf for pf in EXCLUDE_PREFIXES):
                  return True
          return False

      def code_file_count(directory: pathlib.Path) -> int:
          try:
              return sum(
                  1 for f in directory.iterdir()
                  if f.is_file()
                  and f.suffix in CODE_EXT
                  and f.name not in ("__init__.py",)
              )
          except PermissionError:
              return 0

      candidates = []

      # 1. Python-Pakete
      for d in sorted(ROOT.rglob("__init__.py")):
          pkg_dir = d.parent
          rel = pkg_dir.relative_to(ROOT)
          if is_excluded_path(rel):
              continue
          if code_file_count(pkg_dir) < MIN_CODE_FILES:
              continue
          candidates.append((str(rel), "python_package"))

      # 2. Top-Level-Bereiche: backend/, frontend/
      for name in ("backend", "frontend"):
          d = ROOT / name
          if d.is_dir() and code_file_count(d) >= 1:
              rel = pathlib.Path(name)
              if not is_excluded_path(rel):
                  candidates.append((name, "top_level"))

      # 3. Wichtige Frontend-Unterverzeichnisse (max. Tiefe 4 unter frontend/src)
      frontend_src = ROOT / "frontend" / "src"
      if frontend_src.is_dir():
          for d in sorted(frontend_src.rglob("*")):
              if not d.is_dir():
                  continue
              rel = d.relative_to(ROOT)
              if is_excluded_path(rel):
                  continue
              if len(rel.parts) > 4:
                  continue
              if code_file_count(d) >= MIN_CODE_FILES:
                  candidates.append((str(rel), "frontend"))

      # Deduplizieren + Fehlende ermitteln
      seen = set()
      modules = []
      for path_str, kind in candidates:
          if path_str in seen:
              continue
          seen.add(path_str)
          d = ROOT / path_str
          missing_claude = not (d / "CLAUDE.md").exists()
          missing_cube   = not (d / "borg-cube.md").exists()
          if missing_claude or missing_cube:
              modules.append({
                  "path":           path_str,
                  "type":           kind,
                  "missing_claude": missing_claude,
                  "missing_cube":   missing_cube,
              })

      # Slug + Shard vergeben
      for i, m in enumerate(modules):
          m["slug"]  = re.sub(r"[^A-Za-z0-9]+", "__", m["path"]).strip("_")
          m["shard"] = i % NUM_SHARDS

      manifest = {"modules": modules, "total": len(modules), "num_shards": NUM_SHARDS}
      with open(f"{ART}/modules/manifest.json", "w") as f:
          json.dump(manifest, f, indent=2)

      # Pro-Shard-Dateien schreiben (auch leere вЂ” die Subagenten erkennen das)
      for k in range(NUM_SHARDS):
          shard_mods = [m for m in modules if m["shard"] == k]
          with open(f"{ART}/modules/shard-{k}.json", "w") as f:
              json.dump({"shard": k, "modules": shard_mods}, f, indent=2)

      if modules:
          print(f"Found {len(modules)} module(s) needing documentation:\n")
          for m in modules:
              missing = []
              if m["missing_claude"]: missing.append("CLAUDE.md")
              if m["missing_cube"]:   missing.append("borg-cube.md")
              print(f"  [shard {m['shard']}] {m['path']}  в†’  missing: {', '.join(missing)}")
      else:
          print("All modules already have CLAUDE.md and borg-cube.md. Nothing to do.")
      PY
    timeout: 30000

  # в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  # PHASE 2: PARALLELE ANALYSE вЂ” 4Г— qwen3.5-9b (Subagenten)
  #
  # Alle 4 Nodes laufen in derselben DAG-Layer в†’ echte ParallelitГ¤t.
  # Kleines Modell, simple und konkrete Instruktionen, 30-min idle_timeout.
  # Leere Shards (weniger als 4 Module) werden sauber Гјbersprungen.
  # в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ

  - id: analyze-shard-0
    depends_on: [scan-modules]
    context: fresh
    provider: pi
    model: lm-studio/qwen/qwen3.5-9b
    idle_timeout: 1800000
    prompt: |
      # Borg Sanitizer вЂ” Code Analysis (Shard 0)

      You are a code analyst subagent. Analyze ONLY the modules assigned to you and
      write one factual analysis file per module. Describe only what you actually read.

      ## Step 1 вЂ” Read your assignment
      Read `$ARTIFACTS_DIR/modules/shard-0.json`. It contains a `modules` list; each
      entry has: `path`, `slug`, `type`, `missing_claude`, `missing_cube`.

      If the `modules` list is empty: write `$ARTIFACTS_DIR/analysis/shard-0-empty.txt`
      with the text `no modules in this shard` and finish immediately.

      ## Step 2 вЂ” Analyze each module
      For EACH module, using its `path`:
      - List the files directly inside `<path>` (do NOT recurse into subdirectories).
      - Read the `.py`, `.ts`, `.svelte`, and `.yaml` files there.
      - Write `$ARTIFACTS_DIR/analysis/<slug>.md` with EXACTLY these sections:

        # Analysis: <path>

        ## Purpose
        2-3 sentences on what this module does.

        ## Public API
        Exported functions, classes, and HTTP routes вЂ” with signatures.

        ## Data Models
        Key SQLAlchemy models or TypeScript types defined here.

        ## Dependencies
        What this module imports from other project modules; what calls it if visible.

        ## Configuration
        Env vars or settings this module reads. Write "none" if none.

        ## Commands
        Module-specific build/test/lint commands. Write "inherits root" if none.

        ## Conventions and Pitfalls
        Patterns and gotchas observed in the code.

      ## Step 3 вЂ” Finish
      After all your modules are analyzed, end with: <promise>SHARD_0_ANALYZED</promise>

  - id: analyze-shard-1
    depends_on: [scan-modules]
    context: fresh
    provider: pi
    model: lm-studio/qwen/qwen3.5-9b
    idle_timeout: 1800000
    prompt: |
      # Borg Sanitizer вЂ” Code Analysis (Shard 1)

      You are a code analyst subagent. Analyze ONLY the modules assigned to you and
      write one factual analysis file per module. Describe only what you actually read.

      ## Step 1 вЂ” Read your assignment

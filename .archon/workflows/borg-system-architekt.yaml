# ═════════════════════════════════════════════════════════════════════
# Borg System Architekt — Paketbasierte Fresh-Context-Entwicklung
# ═════════════════════════════════════════════════════════════════════
# Inspiriert von archon-idea-to-pr, archon-plan-to-pr und archon-architect.
# Der Workflow plant zuerst sauber trennbare Pakete und führt danach jedes
# Paket mit hartem Kontext-Cut aus: Qwen implementiert, Gemma reviewed,
# Qwen fixt, GPT 5.5 reviewed am Ende das Gesamtsystem.
# ═════════════════════════════════════════════════════════════════════

name: borg-system-architekt
description: |
  Use when: You have a feature idea, product requirement, architectural change, or existing plan
  and want careful package-based implementation with hard context cuts.
  Triggers: "borg system architekt", "system architekt", "architect and implement",
            "plan packages", "fresh context implementation", "implement with package reviews".

  Does:
  1. Creates a strong architecture plan and up to 6 separable implementation packages.
  2. Implements each package in its own fresh-context Qwen node.
  3. Reviews each package in its own fresh-context Gemma node for a different local opinion.
  4. Fixes each reviewed package in its own fresh-context Qwen node.
  5. Runs deterministic validation.
  6. Performs a final whole-system GPT 5.5 review.
  7. Finalizes a PR and writes a workflow summary.

  NOT for: tiny one-file fixes, quick questions, standalone PR review, or workflows where context continuity is desired.

provider: pi
model: lm-studio/qwen/qwen3.6-27b
worktree:
  enabled: true

nodes:
  - id: init
    bash: |
      set -euo pipefail
      mkdir -p "$ARTIFACTS_DIR/packages" "$ARTIFACTS_DIR/reviews" "$ARTIFACTS_DIR/fixes" "$ARTIFACTS_DIR/final"
      cat > "$ARTIFACTS_DIR/state.json" << 'EOF'
      {
        "status": "initialized",
        "finalReview": "pending"
      }
      EOF
      echo "Initialized Borg System Architekt artifacts at $ARTIFACTS_DIR"
    timeout: 10000

  - id: architecture-plan
    depends_on: [init]
    context: fresh
    provider: claude
    model: claude-opus-4-7
    effort: high
    thinking: enabled
    idle_timeout: 1800000
    prompt: |
      # Borg System Architekt — Architecture and Package Planning

      You are the system architect. Transform the user's request into a safe,
      package-based implementation plan. Do NOT implement code in this node.

      ## User Request
      $ARGUMENTS

      ## Hard Rules
      - Plan only. Do not edit source files.
      - Inspect the codebase deeply enough to avoid fantasy architecture.
      - Create 1 to 6 packages. Prefer fewer, cleaner packages over artificial splitting.
      - Packages should be separable enough that different fresh-context agents can implement them.
      - Each package must be self-contained: files to read, files to change, contracts,
        validation commands, success criteria, and risks.
      - If two tasks cannot be cleanly separated, merge them.
      - Avoid Opus for implementation. Implementation will be Qwen.

      ## Required Artifacts
      Write `$ARTIFACTS_DIR/architecture-plan.md` with:
      - Executive summary
      - Current architecture findings with file references
      - Target architecture
      - Package breakdown table
      - Cross-package contracts
      - Risk register
      - Validation strategy
      - Rollback/containment notes

      Write `$ARTIFACTS_DIR/task-list.json` as valid JSON with package ids `P01`, `P02`, ... up to `P06`:
      ```json
      {
        "feature": "short name",
        "baseBranch": "$BASE_BRANCH",
        "packages": [
          {
            "id": "P01",
            "title": "short imperative title",
            "status": "pending",
            "reviewStatus": "pending",
            "fixStatus": "pending",
            "summary": "what this package delivers",
            "readFiles": ["paths the implementer must inspect"],
            "changeFiles": ["paths expected to be created or modified"],
            "contracts": ["interfaces/events/API shapes this package must preserve or expose"],
            "implementationSteps": ["step 1", "step 2"],
            "validationCommands": ["deterministic commands to run"],
            "successCriteria": ["observable criteria"],
            "risks": ["package-specific risks"]
          }
        ]
      }
      ```

      Write one self-contained handoff per package:
      `$ARTIFACTS_DIR/packages/P01.md`, `$ARTIFACTS_DIR/packages/P02.md`, ...

      Each handoff must include:
      - Package id and title
      - Files to read first
      - Exact implementation steps
      - Expected file changes
      - Contracts with other packages
      - Validation commands
      - Done criteria
      - What NOT to do

      End with `<promise>ARCHITECTURE_PLAN_COMPLETE</promise>`.

  - id: verify-plan-artifacts
    depends_on: [architecture-plan]
    bash: |
      set -euo pipefail
      test -s "$ARTIFACTS_DIR/architecture-plan.md"
      test -s "$ARTIFACTS_DIR/task-list.json"
      python3 - << 'PY'
      import json, os, re, sys
      art = os.environ['ARTIFACTS_DIR']
      data = json.load(open(os.path.join(art, 'task-list.json')))
      packages = data.get('packages')
      if not isinstance(packages, list) or not packages:
          raise SystemExit('task-list.json must contain a non-empty packages array')
      if len(packages) > 6:
          raise SystemExit('Borg System Architekt supports max 6 packages per run')
      expected = [f'P{i:02d}' for i in range(1, len(packages)+1)]
      ids = [p.get('id') for p in packages]
      if ids != expected:
          raise SystemExit(f'package ids must be contiguous: {expected}, got {ids}')
      for p in packages:
          pid = p['id']
          handoff = os.path.join(art, 'packages', f'{pid}.md')
          if not os.path.exists(handoff) or os.path.getsize(handoff) == 0:
              raise SystemExit(f'missing package handoff: {handoff}')
          for key in ['title','summary','readFiles','changeFiles','implementationSteps','validationCommands','successCriteria']:
              if key not in p:
                  raise SystemExit(f'{pid} missing key {key}')
      print(f'PLAN_OK packages={len(packages)} ids={",".join(ids)}')
      PY
    timeout: 30000

  # ── P01: implementation, independent review, and targeted fixes ──

  - id: slot-p01
    depends_on: [verify-plan-artifacts]
    bash: |
      set -euo pipefail
      if python3 - << 'PY2'
      import json, os, sys
      p = os.path.join(os.environ['ARTIFACTS_DIR'], 'task-list.json')
      data = json.load(open(p))
      ids = [pkg.get('id') for pkg in data.get('packages', [])]
      sys.exit(0 if 'P01' in ids else 1)
      PY2
      then
        echo RUN
      else
        echo SKIP
      fi
    timeout: 10000

  - id: implement-p01
    depends_on: [slot-p01]
    when: "$slot-p01.output == 'RUN'"
    context: fresh
    provider: pi
    model: lm-studio/qwen/qwen3.6-27b
    idle_timeout: 1800000
    prompt: |
      # Borg System Architekt — Implement P01

      You are Qwen implementing package P01. This is a hard context cut.
      You have no memory from planning or other packages except artifacts on disk.

      ## Required First Reads
      1. `$ARTIFACTS_DIR/architecture-plan.md`
      2. `$ARTIFACTS_DIR/task-list.json`
      3. `$ARTIFACTS_DIR/packages/P01.md`
      4. Only the source files listed in the package handoff, plus directly necessary neighbors.

      ## Scope Rules
      - Implement ONLY package P01.
      - Do not implement future packages.
      - Do not refactor outside the stated package unless required for compilation, and document it.
      - Preserve contracts from the architecture plan.
      - If the package is blocked by an unmet dependency, do not guess. Write a blocker artifact.

      ## Work Procedure
      1. Mark package P01 as `in_progress` in `$ARTIFACTS_DIR/task-list.json`.
      2. Implement the package with minimal, pattern-following changes.
      3. Run the package validation commands where possible.
      4. Write `$ARTIFACTS_DIR/packages/P01-implementation.md` with:
         - Summary of changes
         - Files changed
         - Validation commands and exact results
         - Deviations from plan
         - Risks or questions for review
      5. Update package P01 status to `implemented` or `blocked` in task-list.json.

      End with `<promise>P01_IMPLEMENTED</promise>`.

  - id: review-p01
    depends_on: [implement-p01]
    context: fresh
    provider: pi
    model: lm-studio/google/gemma-4-e4b
    idle_timeout: 1800000
    prompt: |
      # Borg System Architekt — Independent Gemma Review for P01

      You are Gemma reviewing package P01. This is a hard context cut.
      You did not implement the package. Be skeptical, concrete, and evidence-based.

      ## Required First Reads
      1. `$ARTIFACTS_DIR/architecture-plan.md`
      2. `$ARTIFACTS_DIR/task-list.json`
      3. `$ARTIFACTS_DIR/packages/P01.md`
      4. `$ARTIFACTS_DIR/packages/P01-implementation.md`
      5. The actual changed files relevant to P01

      ## Review Dimensions
      - Scope discipline: only package P01 changed?
      - Correctness against package success criteria
      - Fit with existing architecture and project patterns
      - Cross-package contract compatibility
      - Edge cases and error handling
      - Security/input validation/data safety
      - Tests and validation evidence
      - Simplicity and maintainability

      ## Required Artifact
      Write `$ARTIFACTS_DIR/reviews/P01-gemma-review.md`:
      ```markdown
      # Package Review — P01

      ## Verdict: PASS / FAIL

      ## Summary

      ## Findings
      ### CRITICAL
      - [ ] finding → file:line
      ### HIGH
      - [ ] finding → file:line
      ### MEDIUM
      - [ ] finding → file:line
      ### LOW
      - [ ] finding → file:line

      ## Required Fixes for Qwen
      - concrete checklist
      ```

      Update package P01 `reviewStatus` in task-list.json to `passed` or `failed`.
      End with `<promise>P01_REVIEWED</promise>`.

  - id: fix-p01
    depends_on: [review-p01]
    context: fresh
    provider: pi
    model: lm-studio/qwen/qwen3.6-27b
    idle_timeout: 1800000
    prompt: |
      # Borg System Architekt — Fix Review Findings for P01

      You are Qwen fixing package P01. This is a hard context cut.

      ## Required First Reads
      - `$ARTIFACTS_DIR/task-list.json`
      - `$ARTIFACTS_DIR/packages/P01.md`
      - `$ARTIFACTS_DIR/packages/P01-implementation.md`
      - `$ARTIFACTS_DIR/reviews/P01-gemma-review.md`

      ## Behavior
      - If the review verdict is PASS and has no unchecked CRITICAL/HIGH findings, write
        `$ARTIFACTS_DIR/fixes/P01-no-fixes-needed.md` and stop.
      - If the review verdict is FAIL, fix all CRITICAL and HIGH findings.
      - Fix MEDIUM findings only when straightforward and low-risk.
      - Do not broaden scope beyond package P01.
      - Run relevant validation commands.

      ## Required Artifact
      Write `$ARTIFACTS_DIR/fixes/P01-fixes.md` or `P01-no-fixes-needed.md` with:
      - Review findings addressed
      - Files changed
      - Validation results
      - Remaining risks

      Update package P01 `fixStatus` to `fixed` or `not_needed`.
      End with `<promise>P01_FIX_DONE</promise>`.


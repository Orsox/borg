# ═════════════════════════════════════════════════════════════════════
# Borg System Architekt — Dynamische, sequenzielle Fresh-Context-Entwicklung
# ═════════════════════════════════════════════════════════════════════
# Der Planner bestimmt die Anzahl der Tasks dynamisch. Danach arbeitet ein
# einzelner sequenzieller Loop jeden Task nacheinander ab — mit hartem
# Kontext-Cut pro Iteration, Qwen 3.6 auf Pi und Dateistate in $ARTIFACTS_DIR.
# ═════════════════════════════════════════════════════════════════════

name: borg-system-architekt
description: |
  Use when: You have a feature idea, product requirement, architectural change, or existing plan
  and want careful task-based implementation with hard context cuts and no parallel task execution.
  Triggers: "borg system architekt", "system architekt", "architect and implement",
            "plan tasks", "fresh context implementation", "implement sequentially".

  Does:
  1. Creates a strong architecture plan and a dynamic task list.
  2. Lets the planner decide how many tasks are needed.
  3. Processes exactly one task per loop iteration with fresh context.
  4. Performs implementation, focused self-review, and targeted fixes inside that iteration.
  5. Persists all state to artifacts on disk so the loop can continue safely.
  6. Runs deterministic validation.
  7. Performs a final whole-system Qwen 3.6 review.
  8. Finalizes a PR and writes a workflow summary.

  NOT for: tiny one-file fixes, quick questions, standalone PR review, or workflows where broad parallel fan-out is desired.

provider: pi
model: lm-studio/qwen/qwen3.6-27b
worktree:
  enabled: true

nodes:
  - id: init
    bash: |
      set -euo pipefail
      mkdir -p "$ARTIFACTS_DIR/tasks" "$ARTIFACTS_DIR/reviews" "$ARTIFACTS_DIR/fixes" "$ARTIFACTS_DIR/final" "$ARTIFACTS_DIR/logs"
      cat > "$ARTIFACTS_DIR/state.json" << 'EOF'
      {
        "status": "initialized",
        "mode": "sequential-dynamic-tasks",
        "finalReview": "pending"
      }
      EOF
      cat > "$ARTIFACTS_DIR/task-list.json" << 'EOF'
      {
        "feature": "pending",
        "baseBranch": "pending",
        "tasks": []
      }
      EOF
      echo "Initialized Borg System Architekt artifacts at $ARTIFACTS_DIR"
    timeout: 10000

  - id: architecture-plan
    depends_on: [init]
    context: fresh
    provider: pi
    model: lm-studio/qwen/qwen3.6-27b
    effort: high
    thinking: enabled
    idle_timeout: 7200000
    retry:
      max_attempts: 4
      delay_ms: 5000
      on_error: all
    prompt: |
      # Borg System Architekt — Dynamic Architecture and Task Planning

      You are the system architect. Transform the user's request into a safe,
      task-based implementation plan. Do NOT implement code in this node.

      ## User Request
      $ARGUMENTS

      ## Hard Rules
      - Plan only. Do not edit source files.
      - Inspect the codebase deeply enough to avoid fantasy architecture.
      - Decide the number of tasks dynamically. Do not force an artificial fixed count.
      - Prefer fewer, stronger tasks over fragmented micro-tasks.
      - Tasks must be sequenced so a single fresh-context worker can execute them one by one.
      - Each task must be self-contained: files to read, files to change, contracts,
        validation commands, success criteria, and risks.
      - If two tasks cannot be cleanly separated, merge them.
      - Preserve existing architecture and patterns.
      - Implementation later runs on Qwen 3.6 with fresh context per task, so every
        task handoff must be fully bootstrappable from disk artifacts.

      ## Required Artifacts
      Write `$ARTIFACTS_DIR/architecture-plan.md` with:
      - Executive summary
      - Current architecture findings with file references
      - Target architecture
      - Dynamic task breakdown table in execution order
      - Cross-task contracts and sequencing constraints
      - Risk register
      - Validation strategy
      - Rollback/containment notes

      Write `$ARTIFACTS_DIR/task-list.json` as valid JSON:
      ```json
      {
        "feature": "short name",
        "baseBranch": "$BASE_BRANCH",
        "executionMode": "sequential",
        "tasks": [
          {
            "id": "T01",
            "title": "short imperative title",
            "status": "pending",
            "summary": "what this task delivers",
            "readFiles": ["paths the implementer must inspect"],
            "changeFiles": ["paths expected to be created or modified"],
            "contracts": ["interfaces/events/API shapes this task must preserve or expose"],
            "implementationSteps": ["step 1", "step 2"],
            "validationCommands": ["deterministic commands to run"],
            "successCriteria": ["observable criteria"],
            "risks": ["task-specific risks"],
            "dependsOn": ["earlier task ids if any"]
          }
        ]
      }
      ```

      Requirements for `task-list.json`:
      - Use contiguous task ids: `T01`, `T02`, `T03`, ...
      - Create as many tasks as truly needed.
      - Status values start as `pending`.
      - `dependsOn` may be empty, but if present it may only reference earlier tasks.

      Write one self-contained handoff per task:
      `$ARTIFACTS_DIR/tasks/T01.md`, `$ARTIFACTS_DIR/tasks/T02.md`, ...

      Each handoff must include:
      - Task id and title
      - Why this task exists now in sequence
      - Files to read first
      - Exact implementation steps
      - Expected file changes
      - Contracts with earlier/later tasks
      - Validation commands
      - Done criteria
      - What NOT to do

      End with `<promise>ARCHITECTURE_PLAN_COMPLETE</promise>`.

  - id: verify-plan-artifacts
    depends_on: [architecture-plan]
    bash: |
      set -euo pipefail
      test -s "$ARTIFACTS_DIR/architecture-plan.md"
      test -s "$ARTIFACTS_DIR/task-list.json"
      python3 - << 'PY'
      import json, os, sys
      art = os.environ['ARTIFACTS_DIR']
      data = json.load(open(os.path.join(art, 'task-list.json')))
      tasks = data.get('tasks')
      if not isinstance(tasks, list) or not tasks:
          raise SystemExit('task-list.json must contain a non-empty tasks array')
      expected = [f'T{i:02d}' for i in range(1, len(tasks) + 1)]
      ids = [t.get('id') for t in tasks]
      if ids != expected:
          raise SystemExit(f'task ids must be contiguous: {expected}, got {ids}')
      seen = set()
      for task in tasks:
          tid = task['id']
          handoff = os.path.join(art, 'tasks', f'{tid}.md')
          if not os.path.exists(handoff) or os.path.getsize(handoff) == 0:
              raise SystemExit(f'missing task handoff: {handoff}')
          for key in ['title','summary','readFiles','changeFiles','implementationSteps','validationCommands','successCriteria','dependsOn']:
              if key not in task:
                  raise SystemExit(f'{tid} missing key {key}')
          deps = task.get('dependsOn', [])
          if not isinstance(deps, list):
              raise SystemExit(f'{tid} dependsOn must be a list')
          for dep in deps:
              if dep not in seen:
                  raise SystemExit(f'{tid} has invalid or forward dependency: {dep}')
          seen.add(tid)
      print(f'PLAN_OK tasks={len(tasks)} ids={",".join(ids)}')
      PY
    timeout: 30000

  - id: process-tasks
    depends_on: [verify-plan-artifacts]
    idle_timeout: 7200000
    loop:
      max_iterations: 40
      fresh_context: true
      until: ALL_TASKS_COMPLETE
      until_bash: |
        python3 - << 'PY'
        import json, os, sys
        data = json.load(open(os.path.join(os.environ['ARTIFACTS_DIR'], 'task-list.json')))
        tasks = data.get('tasks', [])
        if not tasks:
            sys.exit(1)
        open_statuses = {'pending', 'in_progress', 'reviewing', 'fixing'}
        if any(task.get('status') in open_statuses for task in tasks):
            sys.exit(1)
        sys.exit(0)
        PY
      prompt: |
        # Borg System Architekt — Sequential Dynamic Task Worker

        You are Qwen 3.6 executing exactly one planned task in this iteration.
        This is a hard context cut. You have no memory except what you read from disk.

        ## Core Inputs
        - User request: `$ARGUMENTS`
        - Architecture plan: `$ARTIFACTS_DIR/architecture-plan.md`
        - Task list: `$ARTIFACTS_DIR/task-list.json`
        - Workflow state: `$ARTIFACTS_DIR/state.json`
        - Previous iteration output: `$LOOP_PREV_OUTPUT`

        ## Mission
        Process exactly one eligible task from `task-list.json` per iteration.
        Eligible means:
        - `status` is `pending`
        - all `dependsOn` tasks are already terminal (`done` or `blocked`)

        If there is no eligible task and no task remains open, output:
        `<promise>ALL_TASKS_COMPLETE</promise>`

        ## Required Procedure
        1. Read the architecture plan and full task list.
        2. Select the next eligible task in order.
        3. Mark that task `in_progress` in `task-list.json`.
        4. Read `$ARTIFACTS_DIR/tasks/<TASK_ID>.md` and the listed source files.
        5. Implement only that task.
        6. Run the task's validation commands where possible.
        7. Perform a focused self-review of only that task against:
           - scope discipline
           - correctness
           - contract compatibility
           - error handling
           - simplicity
           - validation evidence
        8. Fix your own concrete findings immediately if they are safe and in scope.
        9. Write these artifacts for the task:
           - `$ARTIFACTS_DIR/tasks/<TASK_ID>-implementation.md`
           - `$ARTIFACTS_DIR/reviews/<TASK_ID>-review.md`
           - `$ARTIFACTS_DIR/fixes/<TASK_ID>-fixes.md` or `<TASK_ID>-no-fixes-needed.md`
        10. Update `task-list.json`:
            - `done` if task is complete and validated enough
            - `blocked` only if a real blocker remains after investigation
        11. If blocked, record the blocker clearly in the task artifacts and status.

        ## Hard Rules
        - Never start a second task in the same iteration.
        - Do not broaden scope beyond the selected task unless required for compilation,
          and document any spillover explicitly.
        - Prefer minimal, pattern-following edits.
        - Re-bootstrap from disk; do not rely on hidden memory.
        - If validation fails, attempt targeted in-scope fixes before declaring blocked.

        ## Output Contract
        End your response with one of:
        - `<promise>TASK_PROCESSED</promise>` when one task was handled
        - `<promise>ALL_TASKS_COMPLETE</promise>` when all tasks are terminal

  - id: validate
    depends_on: [process-tasks]
    bash: |
      set +e
      mkdir -p "$ARTIFACTS_DIR/final"
      {
        echo "# Validation Results"
        echo
        echo "## Git Status"
        git status --short
        echo
        echo "## Git Diff Stat"
        git diff --stat
        echo
        echo "## Backend"
        if [ -d backend ]; then
          (cd backend && uv run python -m pytest -v)
          echo "backend_pytest_exit=$?"
        else
          echo "No backend directory"
        fi
        echo
        echo "## Frontend"
        if [ -d frontend ]; then
          (cd frontend && npm run test)
          echo "frontend_test_exit=$?"
          (cd frontend && npm run type-check)
          echo "frontend_typecheck_exit=$?"
          (cd frontend && npm run lint)
          echo "frontend_lint_exit=$?"
        else
          echo "No frontend directory"
        fi
      } 2>&1 | tee "$ARTIFACTS_DIR/final/validation.md"
      exit 0
    timeout: 1800000

  - id: final-system-review
    depends_on: [validate]
    context: fresh
    provider: pi
    model: lm-studio/qwen/qwen3.6-27b
    idle_timeout: 7200000
    retry:
      max_attempts: 4
      delay_ms: 5000
      on_error: all
    prompt: |
      # Borg System Architekt — Final Whole-System Review

      You are Qwen 3.6 as the final reviewer. Start from a blank context and judge the entire implementation.
      Be strict, evidence-based, and specific. Do not rubber-stamp.

      ## Read These Artifacts
      - `$ARTIFACTS_DIR/architecture-plan.md`
      - `$ARTIFACTS_DIR/task-list.json`
      - `$ARTIFACTS_DIR/tasks/*.md`
      - `$ARTIFACTS_DIR/reviews/*-review.md`
      - `$ARTIFACTS_DIR/fixes/*.md` if present
      - `$ARTIFACTS_DIR/final/validation.md`

      ## Inspect the Actual Diff
      Run and inspect:
      ```bash
      git status --short
      git diff --stat
      git diff
      ```

      ## Review Dimensions
      1. The implementation satisfies the original user request.
      2. The dynamic task plan was followed or deviations are justified.
      3. Sequential task integration is coherent.
      4. Public APIs, schemas, and UI contracts are consistent.
      5. Tests/validation are adequate for the risk.
      6. Security and data-safety concerns are handled.
      7. The result is maintainable and simple enough.
      8. No obvious generated-code artifacts, dead code, or accidental broad changes remain.

      Write `$ARTIFACTS_DIR/final/qwen-final-review.md` with:
      - Verdict: PASS / FAIL
      - Executive summary
      - Blocking findings with file:line evidence
      - Non-blocking findings
      - Task traceability table
      - Validation assessment
      - Merge recommendation

      Update `$ARTIFACTS_DIR/state.json` and set `finalReview` to `pass` or `fail`.
      End with `<promise>FINAL_REVIEW_COMPLETE</promise>`.

  - id: finalize-pr
    command: archon-finalize-pr
    depends_on: [final-system-review]
    context: fresh
    provider: pi
    model: lm-studio/qwen/qwen3.6-27b
    idle_timeout: 7200000
    retry:
      max_attempts: 4
      delay_ms: 5000
      on_error: all

  - id: workflow-summary
    command: archon-workflow-summary
    depends_on: [finalize-pr]
    context: fresh
    provider: pi
    model: lm-studio/qwen/qwen3.6-27b
    idle_timeout: 7200000
    retry:
      max_attempts: 4
      delay_ms: 5000
      on_error: all

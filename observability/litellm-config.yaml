# LiteLLM proxy config — OpenAI-compatible passthrough to the LM Studio hosts
# with Langfuse logging. Sits on the lmstudio network so Agent Mode's pi
# sandbox containers (which run with --network lmstudio-docker_default) can
# reach it at http://litellm:4000/v1; pi's generated models.json points here
# when AGENT_MODE_LLM_PROXY_URL is set (see agent_sandbox/service.py).
#
# Explicit model entries (not a wildcard) because the two personas' models
# live on different LM Studio hosts and the ids contain slashes.

model_list:
  - model_name: "qwen/qwen3.6-35b-a3b-mtp"
    litellm_params:
      model: "openai/qwen/qwen3.6-35b-a3b-mtp"
      api_base: "http://lm8000:1234/v1"
      api_key: "lm-studio"
      # Local-model prefill can take minutes (see Archon/Pi prefill notes) —
      # keep the proxy's per-request budget at the sandbox run timeout.
      timeout: 600
  - model_name: "google/gemma-4-e4b"
    litellm_params:
      model: "openai/google/gemma-4-e4b"
      api_base: "http://lm3080:1234/v1"
      api_key: "lm-studio"
      timeout: 600

litellm_settings:
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  langfuse_default_tags: ["agent-mode", "pi", "litellm"]
  drop_params: true

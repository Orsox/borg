version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: borgos-backend
    ports:
      - "1742:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./borgos.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - INITIAL_PASSWORD=${INITIAL_PASSWORD:-borgborg}
      - ARCHON_PATH=${ARCHON_PATH:-/opt/archon}
      - CORS_ORIGINS=http://localhost:5173,http://localhost:1701
    volumes:
      - borgos-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE=http://localhost:1742
    container_name: borgos-frontend
    ports:
      - "1701:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  borgos-data:

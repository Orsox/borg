version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: borgos-backend
    ports:
      - "1742:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/borgos.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - INITIAL_PASSWORD=${INITIAL_PASSWORD:-borgborg}
      - ARCHON_PATH=${ARCHON_PATH:-/workspace/.archon}
      - ARCHON_API_URL=${ARCHON_API_URL:-http://host.docker.internal:3090}
      - CORS_ORIGINS=http://localhost:5173,http://localhost:1701
      - DISCORD_BOT_LLM_BASE_URL=${DISCORD_BOT_LLM_BASE_URL:-http://lm3080:1234/v1}
      - DISCORD_BOT_LLM_MODEL_ID=${DISCORD_BOT_LLM_MODEL_ID:-google/gemma-4-e4b}
    networks:
      - default
      - lmstudio
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - borgos-data:/app/data
      - ./.archon:/workspace/.archon:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE=http://localhost:1742
    container_name: borgos-frontend
    ports:
      - "1701:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  borgos-data:

networks:
  lmstudio:
    external: true
    name: lmstudio-docker_default
